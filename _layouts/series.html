---
layout: default
---

<link rel="stylesheet" href="{{ '/styles/blog.css' | relative_url }}">

{% include reading_progress.html %}

<div class="bg-dark">
<div class="pt-4 pb-5 bg-info text-white">
    <div class="container">
        <h2>{{ page.title }}</h2>
        <div class="p-5"></div>
    </div>
</div>

<div class="container post-content-container">
    <div class="row">
        <div class="col-md-10">
            {% capture toc_html %}{{ content | toc_only }}{% endcapture %}

            <div id="post" class="card">
                <div class="card-body">
                    <div class="page-content">
                    {% include post_content_with_ads.html content=content %}
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-2 order-first order-md-last" id="toc-sidebar" style="display:none">
            <div class="sticky-md-top" style="top: 10px">
                <div class="mb-3">
                    <div class="card toc-card">
                        <button type="button"
                                class="card-header toc-header toc-mobile-toggle w-100 text-start d-md-none"
                                aria-expanded="false"
                                aria-controls="toc-collapse">
                            <small><i class="fas fa-list me-1" aria-hidden="true"></i>Contents</small>
                            <i class="fas fa-chevron-down toc-chevron ms-auto" aria-hidden="true"></i>
                        </button>
                        <div class="card-header toc-header d-none d-md-block">
                            <small><i class="fas fa-list me-1" aria-hidden="true"></i>Contents</small>
                        </div>
                        <div class="collapse d-md-block" id="toc-collapse">
                            <div class="card-body p-0">
                                <nav id="toc-nav" aria-label="Table of contents">{{ toc_html }}</nav>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="d-none d-md-block">{% include ad-unit.html %}</div>
            </div>
        </div>
    </div>
</div>

<br>
</div>

{% include back_to_top.html %}
