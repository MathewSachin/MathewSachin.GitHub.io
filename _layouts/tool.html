---

<div class="bg-dark">

            <h2>{{ page.title }}</h2>
        </div>
    </div>

    <br>

    <div class="container">
        <div class="row">
            <div class="col-md-10">
                {% if page.in_content_ads %}
                  {% include post_content_with_ads.html content=content %}
                {% else %}
                  {{ content }}
                {% endif %}
            </div>
            <div class="col-md-2">
                <div class="sticky-top" style="top: 10px">
                    {% include ad-unit.html %}
                </div>
            </div>
        </div>
    </div>

    <br>
</div>
