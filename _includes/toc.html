<!-- Mobile TOC: collapsible, hidden on md+ screens -->
<div id="toc-mobile" class="d-none d-md-none mb-3">
    <div class="card toc-card">
        <button type="button"
                class="card-header toc-header toc-mobile-toggle w-100 text-start"
                data-bs-toggle="collapse"
                data-bs-target="#toc-nav-mobile-collapse"
                aria-expanded="false"
                aria-controls="toc-nav-mobile-collapse">
            <small><i class="fas fa-list me-1" aria-hidden="true"></i>Contents</small>
            <i class="fas fa-chevron-down toc-chevron ms-auto" aria-hidden="true"></i>
        </button>
        <div class="collapse" id="toc-nav-mobile-collapse">
            <div class="card-body p-0">
                <nav id="toc-nav-mobile" aria-label="Table of contents"></nav>
            </div>
        </div>
    </div>
</div>
