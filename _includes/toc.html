<!-- Mobile TOC: collapsible, hidden on md+ screens; shown via formatting.js when ≥3 headings -->
<div id="toc-mobile" class="hidden mb-4">
    <div class="card toc-card">
        <button type="button"
                id="toc-mobile-btn"
                class="card-header toc-header toc-mobile-toggle w-full text-left"
                aria-expanded="false"
                aria-controls="toc-nav-mobile-collapse">
            <small><i class="fas fa-list mr-1" aria-hidden="true"></i>Contents</small>
            <i class="fas fa-chevron-down toc-chevron ml-auto" aria-hidden="true"></i>
        </button>
        <div id="toc-nav-mobile-collapse" class="hidden">
            <div class="card-body p-0">
                <nav id="toc-nav-mobile" aria-label="Table of contents">{{ include.toc_html }}</nav>
            </div>
        </div>
    </div>
</div>
