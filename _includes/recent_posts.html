<div class="d-flex justify-content-between align-items-center mb-2">
  <h3 class="mb-0">Latest posts</h3>
  <a href="/blog" class="btn btn-outline-info btn-sm"><i class="fas fa-book-open me-1"></i>All posts</a>
</div>
<div class="posts">
  {% for post in site.posts limit: 5 %}

  {% endfor %}
</div>
<div class="mt-3 text-center">
  <a href="/blog" class="btn btn-info text-white"><i class="fas fa-arrow-right me-1"></i>Read more posts</a>
</div>
