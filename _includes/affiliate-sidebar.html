<div id="affiliate-sidebar" class="mb-3" style="display:none">
    <div class="card toc-card">
        <div class="card-header toc-header">
            <small><i class="fas fa-tags me-1" aria-hidden="true"></i>Affiliate Links</small>
        </div>
        <div class="card-body p-2">
            <a id="affiliate-mx-master"
               href="https://amzn.to/4ma7FKU"
               target="_blank"
               rel="noopener sponsored"
               class="d-flex align-items-center gap-2 text-decoration-none"
               style="color:inherit"
               onclick="if(typeof gtag==='function'){gtag('event','affiliate_click',{event_category:'affiliate',event_label:'MX Master 3S',transport_type:'beacon'});}">
                <i class="fas fa-computer-mouse fa-lg flex-shrink-0" style="color: var(--post-accent, #17a2b8)" aria-hidden="true"></i>
                <small class="lh-sm" style="font-size:0.75rem">
                    <span class="fw-semibold d-block">MX Master 3S</span>
                    <span class="text-muted">Best productivity mouse</span>
                </small>
            </a>
        </div>
    </div>
</div>

<script>
(function () {
    var CACHE_KEY = 'affiliate_country';
    var cached = sessionStorage.getItem(CACHE_KEY);
    if (cached !== null) {
        if (cached === 'IN') {
            var el = document.getElementById('affiliate-sidebar');
            if (el) el.style.display = '';
        }
        return;
    }
    var controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
    var timer = controller ? setTimeout(function () { controller.abort(); }, 3000) : null;
    fetch('https://api.country.is/', controller ? { signal: controller.signal } : undefined)
        .then(function (r) { return r.json(); })
        .then(function (d) {
            clearTimeout(timer);
            var country = (d && d.country) || '';
            sessionStorage.setItem(CACHE_KEY, country);
            if (country === 'IN') {
                var el = document.getElementById('affiliate-sidebar');
                if (el) el.style.display = '';
            }
        })
        .catch(function (err) {
            console.debug('[affiliate-sidebar] country detection failed:', err);
        });
}());
</script>
