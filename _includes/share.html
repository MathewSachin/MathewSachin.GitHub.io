<div class="post-share my-2">
    <span class="me-2 text-muted small">Share:</span>
    <a class="btn btn-sm btn-outline-secondary me-1" href="https://x.com/intent/tweet?text={{ page.title | url_encode }}&amp;url={{ site.url }}{{ page.url }}" target="_blank" rel="noopener" aria-label="Share on X" data-share-method="twitter"><i class="fab fa-x-twitter" aria-hidden="true"></i></a>
    <a class="btn btn-sm btn-outline-secondary me-1" href="https://www.linkedin.com/shareArticle?mini=true&amp;url={{ site.url }}{{ page.url }}&amp;title={{ page.title | url_encode }}" target="_blank" rel="noopener" aria-label="Share on LinkedIn" data-share-method="linkedin"><i class="fab fa-linkedin-in" aria-hidden="true"></i></a>
    <a class="btn btn-sm btn-outline-secondary me-1" href="https://www.reddit.com/submit?url={{ site.url }}{{ page.url }}&amp;title={{ page.title | url_encode }}" target="_blank" rel="noopener" aria-label="Share on Reddit" data-share-method="reddit"><i class="fab fa-reddit-alien" aria-hidden="true"></i></a>
    <a class="btn btn-sm btn-outline-secondary me-1" href="https://wa.me/?text={{ page.title | url_encode }}%20{{ site.url }}{{ page.url }}" target="_blank" rel="noopener" aria-label="Share on WhatsApp" data-share-method="whatsapp"><i class="fab fa-whatsapp" aria-hidden="true"></i></a>
    <a class="btn btn-sm btn-outline-secondary me-1" href="mailto:?subject={{ page.title | url_encode }}&amp;body=Check%20out%20this%20tool%3A%20{{ site.url }}{{ page.url }}" aria-label="Share via Email" data-share-method="email"><i class="fa fa-envelope" aria-hidden="true"></i></a>
    <button type="button" class="btn btn-sm btn-outline-secondary" id="copy-post-link" aria-label="Copy link"><i class="fa fa-link" aria-hidden="true"></i></button>
</div>
