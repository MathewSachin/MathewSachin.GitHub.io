<a href="{{ include.post.url }}" class="blog-post-link text-decoration-none text-reset">
  <div class="blog-post-item py-3">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-1">
      <span class="blog-post-title fw-semibold">{{ include.post.title }}</span>
      <span class="small text-muted text-nowrap">{{ include.post.date | date_to_string }}</span>
    </div>
    <div class="d-flex flex-wrap align-items-center gap-2 mt-1">
      <span class="small text-muted">{% assign post = include.post %}{% include readingTime.html %}</span>
      <div class="post-tag">
        {% for tag in include.post.tags %}
          <span class="badge rounded-pill bg-secondary">{{ tag }}</span>
        {% endfor %}
      </div>
    </div>
  </div>
</a>
