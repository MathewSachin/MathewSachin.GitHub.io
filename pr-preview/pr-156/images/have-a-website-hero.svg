<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <!-- Background -->
  <rect width="600" height="280" fill="#f5f5f5"/>

  <!-- Left section: Social platforms (rented land) -->
  <rect x="15" y="10" width="235" height="260" rx="8" fill="#ebebeb" stroke="#ddd" stroke-width="1"/>
  <text x="132" y="34" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#888" font-weight="bold">SOCIAL PLATFORMS</text>

  <!-- Platform icons (colored squares) -->
  <!-- Twitter/X - dark square -->
  <rect x="42" y="48" width="72" height="72" rx="10" fill="#1a1a1a"/>
  <text x="78" y="92" font-family="Arial, sans-serif" font-size="30" font-weight="bold" text-anchor="middle" fill="#ffffff">𝕏</text>

  <!-- Instagram - gradient-ish square -->
  <rect x="130" y="48" width="72" height="72" rx="10" fill="#c13584"/>
  <rect x="144" y="62" width="44" height="44" rx="8" fill="none" stroke="#fff" stroke-width="3"/>
  <circle cx="166" cy="84" r="12" fill="none" stroke="#fff" stroke-width="3"/>
  <circle cx="183" cy="65" r="4" fill="#fff"/>

  <!-- Facebook - blue square -->
  <rect x="42" y="138" width="72" height="72" rx="10" fill="#1877f2"/>
  <text x="78" y="189" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#ffffff">f</text>

  <!-- LinkedIn / other - blue-grey square -->
  <rect x="130" y="138" width="72" height="72" rx="10" fill="#0077b5"/>
  <text x="166" y="183" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#ffffff">in</text>

  <!-- Chain/lock on all platforms -->
  <rect x="68" y="106" width="40" height="20" rx="4" fill="#555" opacity="0.85"/>
  <path d="M75,106 L75,100 Q88,93 101,100 L101,106" fill="none" stroke="#555" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <text x="88" y="120" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#ddd">locked</text>

  <rect x="156" y="106" width="40" height="20" rx="4" fill="#555" opacity="0.85"/>
  <path d="M163,106 L163,100 Q176,93 189,100 L189,106" fill="none" stroke="#555" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <text x="176" y="120" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#ddd">locked</text>

  <!-- "RENTED LAND" label -->
  <rect x="42" y="222" width="160" height="24" rx="5" fill="#cc3333" opacity="0.85"/>
  <text x="122" y="238" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">RENTED LAND 🔒</text>
  <text x="132" y="258" font-family="Arial, sans-serif" font-size="8.5" text-anchor="middle" fill="#aaa">They own it. You don't.</text>

  <!-- Center divider with arrow -->
  <line x1="280" y1="30" x2="280" y2="250" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Arrow pointing right -->
  <text x="300" y="122" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#2563eb">→</text>
  <text x="300" y="140" font-family="Arial, sans-serif" font-size="7.5" text-anchor="middle" fill="#888">you own</text>
  <text x="300" y="150" font-family="Arial, sans-serif" font-size="7.5" text-anchor="middle" fill="#888">this →</text>

  <!-- Right section: Personal website -->
  <rect x="335" y="10" width="250" height="260" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>

  <!-- Browser mockup window -->
  <rect x="335" y="10" width="250" height="28" rx="8" fill="#e8f0fe"/>
  <rect x="335" y="28" width="250" height="10" fill="#e8f0fe"/>
  <circle cx="350" cy="24" r="4" fill="#ff5f57"/>
  <circle cx="363" cy="24" r="4" fill="#febc2e"/>
  <circle cx="376" cy="24" r="4" fill="#28c840"/>
  <!-- URL bar -->
  <rect x="390" y="16" width="170" height="16" rx="8" fill="#fff" stroke="#c8d8ff" stroke-width="1"/>
  <text x="475" y="27" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2563eb">yourname.com</text>

  <!-- Website content mockup -->
  <rect x="348" y="50" width="224" height="200" rx="4" fill="#fff"/>

  <!-- Site header -->
  <rect x="348" y="50" width="224" height="36" fill="#2563eb" rx="4"/>
  <!-- Home icon -->
  <polygon points="373,58 373,78 382,78 382,70 386,70 386,78 395,78 395,58 384,50" fill="#fff" opacity="0.9" transform="scale(0.65) translate(183,28)"/>
  <text x="390" y="72" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Alex Chen</text>
  <text x="390" y="82" font-family="Arial, sans-serif" font-size="8" fill="#c0d4ff">Developer · Writer · Human</text>

  <!-- Nav links -->
  <text x="358" y="100" font-family="Arial, sans-serif" font-size="9" fill="#2563eb">Blog</text>
  <text x="388" y="100" font-family="Arial, sans-serif" font-size="9" fill="#666">Projects</text>
  <text x="428" y="100" font-family="Arial, sans-serif" font-size="9" fill="#666">About</text>
  <line x1="348" y1="106" x2="572" y2="106" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Blog post previews -->
  <text x="358" y="124" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1a1a1a">Python's JIT Is Finally Fast</text>
  <text x="358" y="136" font-family="Arial, sans-serif" font-size="8" fill="#888">Mar 18, 2026 · 5 min read</text>
  <line x1="358" y1="145" x2="562" y2="145" stroke="#f3f4f6" stroke-width="1"/>

  <text x="358" y="158" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1a1a1a">The Unhackable Console</text>
  <text x="358" y="170" font-family="Arial, sans-serif" font-size="8" fill="#888">Mar 17, 2026 · 8 min read</text>
  <line x1="358" y1="179" x2="562" y2="179" stroke="#f3f4f6" stroke-width="1"/>

  <text x="358" y="192" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1a1a1a">Double Down on Tasks</text>
  <text x="358" y="204" font-family="Arial, sans-serif" font-size="8" fill="#888">Mar 16, 2026 · 6 min read</text>

  <!-- "YOURS FOREVER" label -->
  <rect x="355" y="218" width="210" height="26" rx="5" fill="#2563eb"/>
  <text x="460" y="235" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">YOURS FOREVER 🏠</text>

  <text x="460" y="258" font-family="Arial, sans-serif" font-size="8.5" text-anchor="middle" fill="#2563eb" font-weight="bold">No one can take this away.</text>
</svg>
