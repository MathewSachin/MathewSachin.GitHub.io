<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" width="560" height="360">
  <!-- DevTools panel -->
  <rect width="560" height="360" rx="6" fill="#1e1e1e" stroke="#444" stroke-width="1"/>

  <!-- Top tab bar -->
  <rect width="560" height="34" rx="6" fill="#292929"/>
  <rect x="0" y="28" width="560" height="6" fill="#292929"/>
  <text x="16" y="22" font-family="Arial, sans-serif" font-size="12" fill="#9e9e9e">Elements</text>
  <text x="80" y="22" font-family="Arial, sans-serif" font-size="12" fill="#9e9e9e">Console</text>
  <text x="140" y="22" font-family="Arial, sans-serif" font-size="12" fill="#9e9e9e">Sources</text>
  <!-- Network tab active -->
  <rect x="196" y="0" width="66" height="34" fill="#1e1e1e"/>
  <text x="229" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">Network</text>
  <rect x="196" y="31" width="66" height="3" fill="#4285f4"/>

  <!-- File list left side (narrow) -->
  <rect x="0" y="34" width="200" height="326" fill="#1e1e1e"/>
  <!-- Column header -->
  <rect x="0" y="34" width="200" height="22" fill="#2d2d2d"/>
  <text x="10" y="49" font-family="Arial, sans-serif" font-size="11" fill="#9e9e9e">Name</text>
  <text x="150" y="49" font-family="Arial, sans-serif" font-size="11" fill="#9e9e9e">Status</text>

  <!-- Requests list -->
  <rect x="0" y="56" width="200" height="22" fill="#1e1e1e"/>
  <text x="10" y="71" font-family="monospace" font-size="10" fill="#9cdcfe">svc/wordle/v2/</text>
  <text x="162" y="71" font-family="Arial, sans-serif" font-size="10" fill="#6aaa64">200</text>

  <!-- Selected row -->
  <rect x="0" y="78" width="200" height="22" fill="#264f78"/>
  <text x="10" y="93" font-family="monospace" font-size="10" fill="#ffffff">2026-03-07.json</text>
  <text x="162" y="93" font-family="Arial, sans-serif" font-size="10" fill="#6aaa64">200</text>

  <rect x="0" y="100" width="200" height="22" fill="#252525"/>
  <text x="10" y="115" font-family="monospace" font-size="10" fill="#9cdcfe">stats.json</text>
  <text x="162" y="115" font-family="Arial, sans-serif" font-size="10" fill="#6aaa64">200</text>

  <rect x="0" y="122" width="200" height="22" fill="#1e1e1e"/>
  <text x="10" y="137" font-family="monospace" font-size="10" fill="#9cdcfe">user-data.json</text>
  <text x="162" y="137" font-family="Arial, sans-serif" font-size="10" fill="#6aaa64">200</text>

  <!-- Vertical divider -->
  <line x1="200" y1="34" x2="200" y2="360" stroke="#444" stroke-width="1"/>

  <!-- Right panel - detail view -->
  <rect x="200" y="34" width="360" height="326" fill="#1e1e1e"/>

  <!-- Sub-tabs: Headers, Preview, Response -->
  <rect x="200" y="34" width="360" height="26" fill="#252525"/>
  <text x="218" y="51" font-family="Arial, sans-serif" font-size="11" fill="#9e9e9e">Headers</text>
  <!-- Preview tab active -->
  <rect x="268" y="34" width="56" height="26" fill="#1e1e1e"/>
  <text x="296" y="51" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#ffffff">Preview</text>
  <rect x="268" y="57" width="56" height="3" fill="#4285f4"/>
  <text x="340" y="51" font-family="Arial, sans-serif" font-size="11" fill="#9e9e9e">Response</text>
  <text x="396" y="51" font-family="Arial, sans-serif" font-size="11" fill="#9e9e9e">Initiator</text>
  <text x="452" y="51" font-family="Arial, sans-serif" font-size="11" fill="#9e9e9e">Timing</text>

  <!-- JSON content in preview -->
  <rect x="200" y="60" width="360" height="300" fill="#1e1e1e"/>

  <!-- JSON tree view -->
  <text x="220" y="85" font-family="monospace" font-size="13" fill="#9e9e9e">{</text>

  <text x="236" y="107" font-family="monospace" font-size="13" fill="#9cdcfe">"id"</text>
  <text x="274" y="107" font-family="monospace" font-size="13" fill="#9e9e9e">:</text>
  <text x="284" y="107" font-family="monospace" font-size="13" fill="#b5cea8">1234</text>
  <text x="320" y="107" font-family="monospace" font-size="13" fill="#9e9e9e">,</text>

  <!-- solution line highlighted -->
  <rect x="205" y="112" width="350" height="22" rx="2" fill="#1d3a4a"/>
  <text x="236" y="128" font-family="monospace" font-size="13" fill="#9cdcfe">"solution"</text>
  <text x="324" y="128" font-family="monospace" font-size="13" fill="#9e9e9e">:</text>
  <text x="334" y="128" font-family="monospace" font-size="13" fill="#6aaa64" font-weight="bold">"crane"</text>
  <text x="388" y="128" font-family="monospace" font-size="13" fill="#9e9e9e">,</text>

  <text x="236" y="150" font-family="monospace" font-size="13" fill="#9cdcfe">"print_date"</text>
  <text x="332" y="150" font-family="monospace" font-size="13" fill="#9e9e9e">:</text>
  <text x="342" y="150" font-family="monospace" font-size="13" fill="#ce9178">"2026-03-07"</text>
  <text x="440" y="150" font-family="monospace" font-size="13" fill="#9e9e9e">,</text>

  <text x="236" y="172" font-family="monospace" font-size="13" fill="#9cdcfe">"days_since_launch"</text>
  <text x="382" y="172" font-family="monospace" font-size="13" fill="#9e9e9e">:</text>
  <text x="392" y="172" font-family="monospace" font-size="13" fill="#b5cea8">1234</text>
  <text x="432" y="172" font-family="monospace" font-size="13" fill="#9e9e9e">,</text>

  <text x="220" y="194" font-family="monospace" font-size="13" fill="#9e9e9e">}</text>

  <!-- Callout arrow pointing at solution -->
  <line x1="555" y1="123" x2="445" y2="123" stroke="#fbbc04" stroke-width="2"/>
  <polygon points="395,123 410,116 410,130" fill="#fbbc04"/>
  <text x="510" y="115" font-family="Arial, sans-serif" font-size="11" fill="#fbbc04">Answer!</text>
</svg>
