<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <!-- Background -->
  <rect width="600" height="280" fill="#1a1a1a"/>

  <!-- === VIM PANEL === -->
  <rect x="0" y="0" width="198" height="280" fill="#0d0d0d"/>
  <!-- Vim label bar -->
  <rect x="0" y="0" width="198" height="28" fill="#1c1c1c"/>
  <text x="99" y="19" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#aaee77">Vim</text>
  <!-- Vim content -->
  <text x="10" y="52" font-family="monospace" font-size="10" fill="#55ff55">function</text>
  <text x="70" y="52" font-family="monospace" font-size="10" fill="#88ffcc"> greet</text>
  <text x="106" y="52" font-family="monospace" font-size="10" fill="#e8e8e8">(name) {</text>
  <text x="10" y="67" font-family="monospace" font-size="10" fill="#e8e8e8">  </text>
  <text x="18" y="67" font-family="monospace" font-size="10" fill="#55ff55">return</text>
  <text x="60" y="67" font-family="monospace" font-size="10" fill="#ffdd55"> `Hello,</text>
  <text x="108" y="67" font-family="monospace" font-size="10" fill="#aaffaa"> ${name}</text>
  <text x="152" y="67" font-family="monospace" font-size="10" fill="#ffdd55">!`</text>
  <text x="10" y="82" font-family="monospace" font-size="10" fill="#e8e8e8">}</text>
  <text x="10" y="97" font-family="monospace" font-size="10" fill="#888888">~</text>
  <text x="10" y="112" font-family="monospace" font-size="10" fill="#888888">~</text>
  <text x="10" y="127" font-family="monospace" font-size="10" fill="#888888">~</text>
  <text x="10" y="142" font-family="monospace" font-size="10" fill="#888888">~</text>
  <text x="10" y="157" font-family="monospace" font-size="10" fill="#888888">~</text>
  <text x="10" y="172" font-family="monospace" font-size="10" fill="#888888">~</text>
  <text x="10" y="187" font-family="monospace" font-size="10" fill="#888888">~</text>
  <text x="10" y="202" font-family="monospace" font-size="10" fill="#888888">~</text>
  <text x="10" y="217" font-family="monospace" font-size="10" fill="#888888">~</text>
  <text x="10" y="232" font-family="monospace" font-size="10" fill="#888888">~</text>
  <!-- Block cursor -->
  <rect x="10" y="243" width="7" height="12" fill="#55ff55"/>
  <!-- Vim status bar -->
  <rect x="0" y="258" width="198" height="22" fill="#2a4a2a"/>
  <text x="8" y="273" font-family="monospace" font-size="10" fill="#aaee77">-- NORMAL --</text>
  <text x="140" y="273" font-family="monospace" font-size="10" fill="#88cc88">5:1</text>

  <!-- Panel divider -->
  <rect x="198" y="0" width="2" height="280" fill="#333333"/>

  <!-- === SUBLIME TEXT PANEL === -->
  <rect x="200" y="0" width="198" height="280" fill="#272822"/>
  <!-- Sublime label bar -->
  <rect x="200" y="0" width="198" height="28" fill="#23241f"/>
  <text x="299" y="19" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#fd971f">Sublime</text>
  <!-- Line numbers -->
  <rect x="200" y="28" width="22" height="252" fill="#1e1f1c"/>
  <text x="218" y="50" font-family="monospace" font-size="10" text-anchor="end" fill="#555">1</text>
  <text x="218" y="65" font-family="monospace" font-size="10" text-anchor="end" fill="#555">2</text>
  <text x="218" y="80" font-family="monospace" font-size="10" text-anchor="end" fill="#555">3</text>
  <text x="218" y="95" font-family="monospace" font-size="10" text-anchor="end" fill="#555">4</text>
  <text x="218" y="110" font-family="monospace" font-size="10" text-anchor="end" fill="#555">5</text>
  <text x="218" y="125" font-family="monospace" font-size="10" text-anchor="end" fill="#555">6</text>
  <text x="218" y="140" font-family="monospace" font-size="10" text-anchor="end" fill="#555">7</text>
  <!-- Sublime content -->
  <text x="228" y="50" font-family="monospace" font-size="10" fill="#66d9e8">class</text>
  <text x="262" y="50" font-family="monospace" font-size="10" fill="#a6e22e"> App</text>
  <text x="282" y="50" font-family="monospace" font-size="10" fill="#f8f8f2"> {</text>
  <text x="228" y="65" font-family="monospace" font-size="10" fill="#66d9e8">  constructor</text>
  <text x="320" y="65" font-family="monospace" font-size="10" fill="#f8f8f2">() {</text>
  <text x="228" y="80" font-family="monospace" font-size="10" fill="#f92672">    this</text>
  <text x="264" y="80" font-family="monospace" font-size="10" fill="#f8f8f2">.</text>
  <text x="270" y="80" font-family="monospace" font-size="10" fill="#a6e22e">name</text>
  <text x="298" y="80" font-family="monospace" font-size="10" fill="#f8f8f2"> =</text>
  <text x="310" y="80" font-family="monospace" font-size="10" fill="#e6db74"> "App"</text>
  <text x="340" y="80" font-family="monospace" font-size="10" fill="#f8f8f2">;</text>
  <text x="228" y="95" font-family="monospace" font-size="10" fill="#f8f8f2">  }</text>
  <text x="228" y="110" font-family="monospace" font-size="10" fill="#a6e22e">  run</text>
  <text x="254" y="110" font-family="monospace" font-size="10" fill="#f8f8f2">() {</text>
  <text x="228" y="125" font-family="monospace" font-size="10" fill="#f8f8f2">    </text>
  <text x="246" y="125" font-family="monospace" font-size="10" fill="#66d9e8">console</text>
  <text x="294" y="125" font-family="monospace" font-size="10" fill="#f8f8f2">.</text>
  <text x="300" y="125" font-family="monospace" font-size="10" fill="#a6e22e">log</text>
  <text x="318" y="125" font-family="monospace" font-size="10" fill="#f8f8f2">(</text>
  <text x="324" y="125" font-family="monospace" font-size="10" fill="#e6db74">"hi"</text>
  <text x="348" y="125" font-family="monospace" font-size="10" fill="#f8f8f2">)</text>
  <text x="228" y="140" font-family="monospace" font-size="10" fill="#f8f8f2">  }</text>
  <!-- Minimap -->
  <rect x="372" y="28" width="26" height="252" fill="#1e1f1c"/>
  <rect x="374" y="35" width="20" height="2" fill="#3a3a38"/>
  <rect x="374" y="42" width="16" height="2" fill="#3a3a38"/>
  <rect x="374" y="49" width="20" height="2" fill="#3a3a38"/>
  <rect x="374" y="56" width="14" height="2" fill="#3a3a38"/>
  <rect x="374" y="63" width="18" height="2" fill="#3a3a38"/>
  <!-- Highlighted line in minimap -->
  <rect x="373" y="47" width="22" height="6" fill="#3c3c3a"/>

  <!-- Panel divider -->
  <rect x="398" y="0" width="2" height="280" fill="#333333"/>

  <!-- === VS CODE PANEL === -->
  <rect x="400" y="0" width="200" height="280" fill="#1e1e1e"/>
  <!-- VS Code label bar -->
  <rect x="400" y="0" width="200" height="28" fill="#323233"/>
  <text x="500" y="19" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#4fc1ff">VS Code</text>
