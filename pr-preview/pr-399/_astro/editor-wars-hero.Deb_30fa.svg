  <rect x="400" y="28" width="22" height="252" fill="#252526"/>
  <!-- File explorer icon -->
  <rect x="406" y="38" width="10" height="12" rx="1" fill="#858585"/>
  <rect x="404" y="34" width="8" height="10" rx="1" fill="#cccccc"/>
  <!-- Search icon -->
  <circle cx="411" cy="64" r="5" fill="none" stroke="#858585" stroke-width="1.5"/>
  <line x1="415" y1="68" x2="418" y2="71" stroke="#858585" stroke-width="1.5"/>
  <!-- Extensions icon (puzzle piece) -->
  <rect x="407" y="78" width="8" height="8" rx="1" fill="#858585"/>
  <rect x="411" y="76" width="4" height="4" rx="1" fill="#858585"/>
  <!-- Source control icon (branch) -->
  <circle cx="411" cy="100" r="3" fill="none" stroke="#858585" stroke-width="1.5"/>
  <circle cx="411" cy="110" r="3" fill="none" stroke="#858585" stroke-width="1.5"/>
  <line x1="411" y1="103" x2="411" y2="107" stroke="#858585" stroke-width="1.5"/>

  <!-- File tree -->
  <rect x="422" y="28" width="72" height="252" fill="#252526"/>
  <text x="428" y="44" font-family="Arial, sans-serif" font-size="9" fill="#cccccc">EXPLORER</text>
  <text x="428" y="58" font-family="monospace" font-size="9" fill="#cccccc">▾ src</text>
  <text x="435" y="72" font-family="monospace" font-size="9" fill="#4ec9b0">  app.ts</text>
  <text x="435" y="86" font-family="monospace" font-size="9" fill="#cccccc">  index.ts</text>
  <text x="435" y="100" font-family="monospace" font-size="9" fill="#cccccc">  util.ts</text>
  <text x="428" y="114" font-family="monospace" font-size="9" fill="#cccccc">▾ tests</text>
  <text x="435" y="128" font-family="monospace" font-size="9" fill="#cccccc">  app.test</text>
  <text x="428" y="142" font-family="monospace" font-size="9" fill="#cccccc">package.json</text>

  <!-- Editor area -->
  <rect x="494" y="28" width="106" height="252" fill="#1e1e1e"/>
  <!-- Active tab -->
  <rect x="494" y="28" width="60" height="20" fill="#1e1e1e" stroke="#1e1e1e"/>
  <rect x="494" y="28" width="60" height="20" fill="#252526"/>
  <rect x="494" y="46" width="60" height="2" fill="#4fc1ff"/>
  <text x="524" y="42" font-family="monospace" font-size="9" text-anchor="middle" fill="#cccccc">app.ts</text>
  <!-- Code lines -->
  <text x="498" y="65" font-family="monospace" font-size="9" fill="#569cd6">class</text>
  <text x="526" y="65" font-family="monospace" font-size="9" fill="#4ec9b0"> App</text>
  <text x="546" y="65" font-family="monospace" font-size="9" fill="#d4d4d4"> {</text>
  <text x="498" y="79" font-family="monospace" font-size="9" fill="#dcdcaa">  run</text>
  <text x="518" y="79" font-family="monospace" font-size="9" fill="#d4d4d4">(): </text>
  <text x="534" y="79" font-family="monospace" font-size="9" fill="#4ec9b0">void</text>
  <text x="558" y="79" font-family="monospace" font-size="9" fill="#d4d4d4"> {</text>
  <!-- Highlighted line -->
  <rect x="494" y="83" width="106" height="14" fill="#2a2d2e"/>
  <text x="498" y="93" font-family="monospace" font-size="9" fill="#9cdcfe">    this</text>
  <text x="528" y="93" font-family="monospace" font-size="9" fill="#d4d4d4">.</text>
  <text x="533" y="93" font-family="monospace" font-size="9" fill="#dcdcaa">init</text>
  <text x="553" y="93" font-family="monospace" font-size="9" fill="#d4d4d4">()</text>
  <text x="498" y="107" font-family="monospace" font-size="9" fill="#d4d4d4">  }</text>
  <text x="498" y="121" font-family="monospace" font-size="9" fill="#d4d4d4">}</text>

  <!-- AI autocomplete popup -->
  <rect x="494" y="128" width="102" height="70" rx="3" fill="#252526" stroke="#454545" stroke-width="1"/>
  <rect x="494" y="128" width="102" height="14" rx="3" fill="#37373d"/>
  <rect x="494" y="137" width="102" height="5" fill="#37373d"/>
  <text x="498" y="139" font-family="monospace" font-size="8" fill="#4fc1ff">✦ Copilot</text>
  <text x="498" y="153" font-family="monospace" font-size="8" fill="#4ec9b0">  init</text>
  <text x="518" y="153" font-family="monospace" font-size="8" fill="#d4d4d4">() {</text>
  <text x="498" y="165" font-family="monospace" font-size="8" fill="#9cdcfe">    console</text>
  <text x="554" y="165" font-family="monospace" font-size="8" fill="#d4d4d4">.</text>
  <text x="558" y="165" font-family="monospace" font-size="8" fill="#dcdcaa">log</text>
  <text x="498" y="177" font-family="monospace" font-size="8" fill="#ce9178">    "ready"</text>
  <text x="498" y="189" font-family="monospace" font-size="8" fill="#d4d4d4">  }</text>

  <!-- Status bar -->
  <rect x="400" y="263" width="200" height="17" fill="#007acc"/>
  <text x="430" y="275" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">⎇ main</text>
  <text x="490" y="275" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">TypeScript</text>
  <text x="560" y="275" font-family="Arial, sans-serif" font-size="9" fill="#ffffff">✓ 0</text>
</svg>
