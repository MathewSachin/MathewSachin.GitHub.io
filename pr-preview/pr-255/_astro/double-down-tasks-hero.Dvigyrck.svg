<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" width="480" height="280">
  <!-- Green felt table background -->
  <rect width="480" height="280" fill="#1a5c2e"/>
  <rect width="480" height="280" fill="url(#felt)" opacity="0.15"/>
  <defs>
    <pattern id="felt" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#000" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Table border / inner oval suggestion -->
  <ellipse cx="240" cy="140" rx="220" ry="120" fill="none" stroke="#2a7a3e" stroke-width="4" opacity="0.6"/>

  <!-- Left: Task list card -->
  <rect x="30" y="50" width="160" height="180" rx="10" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="110" y="74" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#333">MY TASKS</text>
  <line x1="42" y1="80" x2="178" y2="80" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Task items with checkmarks -->
  <rect x="48" y="90" width="12" height="12" rx="2" fill="#4caf50"/>
  <text x="55" y="100" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff" font-weight="bold">✓</text>
  <text x="70" y="100" font-family="Arial, sans-serif" font-size="10" fill="#888"><tspan text-decoration="line-through">Reply to emails</tspan></text>

  <rect x="48" y="110" width="12" height="12" rx="2" fill="#4caf50"/>
  <text x="55" y="120" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff" font-weight="bold">✓</text>
  <text x="70" y="120" font-family="Arial, sans-serif" font-size="10" fill="#888"><tspan text-decoration="line-through">Schedule meeting</tspan></text>

  <rect x="48" y="130" width="12" height="12" rx="2" fill="#4caf50"/>
  <text x="55" y="140" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff" font-weight="bold">✓</text>
  <text x="70" y="140" font-family="Arial, sans-serif" font-size="10" fill="#888"><tspan text-decoration="line-through">Review PR</tspan></text>

  <!-- Highlighted important task -->
  <rect x="42" y="156" width="136" height="34" rx="6" fill="#fff9e6" stroke="#f5a623" stroke-width="2"/>
  <rect x="48" y="163" width="12" height="12" rx="2" fill="none" stroke="#f5a623" stroke-width="2"/>
  <text x="68" y="173" font-family="Arial, sans-serif" font-size="10" fill="#b8690a" font-weight="bold">Launch feature ★</text>

  <rect x="48" y="202" width="12" height="12" rx="2" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <text x="70" y="212" font-family="Arial, sans-serif" font-size="10" fill="#bbb">Update docs</text>
  <rect x="48" y="220" width="12" height="12" rx="2" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <text x="70" y="230" font-family="Arial, sans-serif" font-size="10" fill="#bbb">Write blog post</text>

  <!-- Arrow -->
  <line x1="200" y1="140" x2="255" y2="140" stroke="#f5a623" stroke-width="3" stroke-linecap="round"/>
  <polygon points="255,133 268,140 255,147" fill="#f5a623"/>

  <!-- Center: Playing-card style task card -->
  <rect x="275" y="55" width="120" height="160" rx="10" fill="#ffffff" stroke="#f5a623" stroke-width="3"/>
  <text x="290" y="76" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f5a623">★</text>
  <text x="335" y="95" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#555" font-weight="bold">PRIORITY</text>
  <text x="335" y="115" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333" font-weight="bold">TASK</text>
  <text x="335" y="138" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#222" font-weight="bold">Launch</text>
  <text x="335" y="156" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#222" font-weight="bold">Feature</text>
  <text x="375" y="205" font-family="Arial, sans-serif" font-size="13" text-anchor="end" fill="#f5a623" font-weight="bold">★</text>

  <!-- 2× chip / badge -->
  <circle cx="430" cy="90" r="30" fill="#d4a017" stroke="#f5c842" stroke-width="2.5"/>
  <circle cx="430" cy="90" r="24" fill="none" stroke="#f5c842" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="430" y="86" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">2×</text>
  <text x="430" y="100" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#fff3c0">DOUBLE</text>
  <text x="430" y="110" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#fff3c0">DOWN</text>

  <!-- Progress bar at bottom -->
  <rect x="30" y="247" width="420" height="18" rx="9" fill="#0d3d1e"/>
  <rect x="30" y="247" width="290" height="18" rx="9" fill="#f5a623"/>
  <text x="240" y="260" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff" font-weight="bold">Launch Feature — 70% Done</text>

  <text x="240" y="275" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7fc99a">Focus on the one thing that matters</text>
</svg>
