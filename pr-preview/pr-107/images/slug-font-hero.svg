  <text x="495" y="27" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#52c852">Slug Algorithm (GPU)</text>

  <!-- Crisp "G" using smooth bezier paths -->
  <path d="
    M 460,60
    C 430,60 400,80 395,115
    C 390,150 405,185 435,195
    C 460,203 490,198 505,180
    L 505,148
    L 468,148
    L 468,163
    L 490,163
    C 482,177 468,183 452,180
    C 428,174 418,153 420,130
    C 422,107 438,90 460,88
    C 476,88 490,96 497,108
    L 512,100
    C 502,82 482,70 460,60 Z
  " fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>

  <text x="452" y="220" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#52c852">Crisp · Perfect · Scalable</text>
  <text x="452" y="235" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#445">Exact GPU curve evaluation at any size</text>

  <!-- Bottom labels -->
  <rect x="20" y="248" width="560" height="26" rx="5" fill="#111827"/>
  <text x="145" y="264" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a9eff">Traditional: Rasterize → Blur → Upload</text>
  <text x="452" y="264" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#52c852">Slug: Solve curves directly in fragment shader</text>
