<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="640" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0f0a0a"/>
    </linearGradient>
    <linearGradient id="filmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="fadeOut" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0"/>
      <stop offset="40%" style="stop-color:#8b5cf6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="filmClip">
      <rect x="40" y="60" width="340" height="185"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="640" height="300" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="150" x2="640" y2="150" stroke="#1e1b4b" stroke-width="0.5" opacity="0.4"/>
  <line x1="320" y1="0" x2="320" y2="300" stroke="#1e1b4b" stroke-width="0.5" opacity="0.4"/>

  <!-- Left panel: Film strip / video frames fading to static -->
  <rect x="40" y="60" width="340" height="185" rx="8" fill="#050510" opacity="0.8"/>

  <!-- Film frame holes top -->
  <rect x="52" y="66" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="75" y="66" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="98" y="66" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="121" y="66" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="144" y="66" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="167" y="66" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="190" y="66" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="213" y="66" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="236" y="66" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="259" y="66" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="282" y="66" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="305" y="66" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="328" y="66" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="351" y="66" width="12" height="8" rx="2" fill="#1e1b4b"/>

  <!-- Film frame holes bottom -->
  <rect x="52" y="232" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="75" y="232" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="98" y="232" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="121" y="232" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="144" y="232" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="167" y="232" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="190" y="232" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="213" y="232" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="236" y="232" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="259" y="232" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="282" y="232" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="305" y="232" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="328" y="232" width="12" height="8" rx="2" fill="#1e1b4b"/>
  <rect x="351" y="232" width="12" height="8" rx="2" fill="#1e1b4b"/>

  <!-- Video frames — left 2 vivid, right 2 fading to static/dead -->
  <!-- Frame 1: colorful/alive -->
  <rect x="48" y="82" width="68" height="48" rx="3" fill="#1e1b4b"/>
  <rect x="50" y="84" width="64" height="44" rx="2" fill="#312e81"/>
  <text x="82" y="110" font-family="system-ui, sans-serif" font-size="18" fill="#a5b4fc" text-anchor="middle" filter="url(#glow)">▶</text>
  <text x="82" y="122" font-family="system-ui, sans-serif" font-size="7" fill="#6366f1" text-anchor="middle">Feb 2024</text>

  <!-- Frame 2: still bright -->
  <rect x="122" y="82" width="68" height="48" rx="3" fill="#1e1b4b"/>
  <rect x="124" y="84" width="64" height="44" rx="2" fill="#2d2a5e"/>
  <text x="156" y="110" font-family="system-ui, sans-serif" font-size="18" fill="#818cf8" text-anchor="middle" filter="url(#glow)">▶</text>
  <text x="156" y="122" font-family="system-ui, sans-serif" font-size="7" fill="#6366f1" text-anchor="middle">Dec 2024</text>

  <!-- Frame 3: dimming -->
  <rect x="196" y="82" width="68" height="48" rx="3" fill="#1a1a2e"/>
  <rect x="198" y="84" width="64" height="44" rx="2" fill="#16162a"/>
  <text x="230" y="110" font-family="system-ui, sans-serif" font-size="18" fill="#4b4680" text-anchor="middle">⏸</text>
  <text x="230" y="122" font-family="system-ui, sans-serif" font-size="7" fill="#4b4680" text-anchor="middle">2025</text>

  <!-- Frame 4: dead/static -->
  <rect x="270" y="82" width="68" height="48" rx="3" fill="#110f0f"/>
  <rect x="272" y="84" width="64" height="44" rx="2" fill="#0d0b0b"/>
  <!-- Static noise dots -->
  <rect x="278" y="88" width="2" height="2" fill="#2d2d2d" opacity="0.7"/>
  <rect x="285" y="92" width="2" height="2" fill="#333" opacity="0.7"/>
  <rect x="292" y="86" width="3" height="2" fill="#222" opacity="0.7"/>
  <rect x="300" y="95" width="2" height="3" fill="#2a2a2a" opacity="0.7"/>
  <rect x="308" y="89" width="2" height="2" fill="#333" opacity="0.7"/>
  <rect x="315" y="93" width="3" height="2" fill="#222" opacity="0.7"/>
  <rect x="280" y="100" width="2" height="2" fill="#333" opacity="0.5"/>
  <rect x="296" y="104" width="3" height="2" fill="#2d2d2d" opacity="0.5"/>
  <rect x="310" y="98" width="2" height="3" fill="#333" opacity="0.5"/>
  <text x="304" y="118" font-family="system-ui, sans-serif" font-size="7" fill="#4b1818" text-anchor="middle" font-weight="700">OFFLINE</text>
  <text x="304" y="127" font-family="system-ui, sans-serif" font-size="7" fill="#4b1818" text-anchor="middle">Mar 2026</text>

  <!-- Big DISCONTINUED label over bottom of film -->
  <rect x="48" y="155" width="332" height="60" rx="4" fill="#1a0505" opacity="0.85" stroke="#7f1d1d" stroke-width="1"/>
  <text x="214" y="181" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle" filter="url(#glow)" letter-spacing="3">SORA</text>
  <text x="214" y="198" font-family="system-ui, sans-serif" font-size="9" fill="#fca5a5" text-anchor="middle" letter-spacing="2">DISCONTINUED  ·  MARCH 2026</text>
  <text x="214" y="211" font-family="system-ui, sans-serif" font-size="8" fill="#f87171" text-anchor="middle" opacity="0.7">OpenAI text-to-video  ·  2024 – 2026</text>

  <!-- Right panel -->
  <rect x="405" y="60" width="210" height="185" rx="8" fill="#0d0d1a" opacity="0.8"/>
  <text x="510" y="82" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#e2e8f0" text-anchor="middle" letter-spacing="1">WHY SORA FAILED</text>
  <line x1="415" y1="88" x2="605" y2="88" stroke="#1e293b" stroke-width="1"/>

  <!-- Reasons -->
  <circle cx="423" cy="105" r="3" fill="#ef4444"/>
  <text x="432" y="101" font-family="system-ui, sans-serif" font-size="8.5" font-weight="700" fill="#f87171">Cost</text>
  <text x="432" y="112" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8">$1B+/yr compute budget</text>

  <circle cx="423" cy="130" r="3" fill="#ef4444"/>
  <text x="432" y="126" font-family="system-ui, sans-serif" font-size="8.5" font-weight="700" fill="#f87171">Competition</text>
  <text x="432" y="137" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8">Veo 3, Kling, Runway ahead</text>

  <circle cx="423" cy="155" r="3" fill="#ef4444"/>
  <text x="432" y="151" font-family="system-ui, sans-serif" font-size="8.5" font-weight="700" fill="#f87171">Strategy</text>
  <text x="432" y="162" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8">IPO focus on ChatGPT</text>

  <circle cx="423" cy="180" r="3" fill="#ef4444"/>
  <text x="432" y="176" font-family="system-ui, sans-serif" font-size="8.5" font-weight="700" fill="#f87171">Quality</text>
  <text x="432" y="187" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8">Physics &amp; artifact issues</text>

  <circle cx="423" cy="205" r="3" fill="#ef4444"/>
  <text x="432" y="201" font-family="system-ui, sans-serif" font-size="8.5" font-weight="700" fill="#f87171">Revenue</text>
  <text x="432" y="212" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8">Never monetised at scale</text>

  <!-- Timeline vertical line -->
  <line x1="423" y1="102" x2="423" y2="228" stroke="#374151" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Bottom banner -->
  <rect x="40" y="260" width="560" height="28" rx="6" fill="#1a0505" stroke="#7f1d1d" stroke-width="1"/>
  <text x="320" y="278" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#fca5a5" text-anchor="middle">SORA  ·  FROM "THE FUTURE OF VIDEO" TO SHUTDOWN IN 26 MONTHS</text>
</svg>
