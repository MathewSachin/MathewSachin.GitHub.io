<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <!-- Clean light background -->
  <rect width="600" height="280" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="300" y="24" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Multi-Asset Fund vs DIY Portfolio</text>
  <text x="300" y="38" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#888">For Indian Investors</text>

  <!-- LEFT: Multi-Asset Fund -->
  <rect x="20" y="50" width="220" height="200" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="130" y="74" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2563eb">Multi-Asset Fund</text>
  <text x="130" y="87" font-family="Arial, sans-serif" font-size="8.5" text-anchor="middle" fill="#888">One fund, three assets</text>

  <!-- Pie chart - centered at 130, 155 radius 52 -->
  <!-- Equity 60% = 216 degrees: orange #f97316 -->
  <!-- startAngle=0, endAngle=216 -->
  <!-- Debt 20% = 72 degrees: grey #94a3b8 -->
  <!-- Gold 20% = 72 degrees: gold #f59e0b -->

  <!-- Equity slice: 60% - from -90° to 126° (starting top) -->
  <path d="M130,155 L130,103 A52,52 0 1,1 86,181 Z" fill="#f97316"/>
  <!-- Debt slice: 20% - from 126° to 198° -->
  <path d="M130,155 L86,181 A52,52 0 0,1 81,129 Z" fill="#94a3b8"/>
  <!-- Gold slice: 20% - from 198° to 270° (-90°) -->
  <path d="M130,155 L81,129 A52,52 0 0,1 130,103 Z" fill="#f59e0b"/>

  <!-- Center label -->
  <circle cx="130" cy="155" r="22" fill="white"/>
  <text x="130" y="151" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#333" font-weight="bold">₹ Fund</text>
  <text x="130" y="163" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#888">All-in-one</text>

  <!-- Pie legend -->
  <rect x="35" y="218" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="50" y="227" font-family="Arial, sans-serif" font-size="8.5" fill="#555">Equity 60%</text>
  <rect x="108" y="218" width="10" height="10" rx="2" fill="#94a3b8"/>
  <text x="122" y="227" font-family="Arial, sans-serif" font-size="8.5" fill="#555">Debt 20%</text>
  <rect x="180" y="218" width="10" height="10" rx="2" fill="#f59e0b"/>
  <text x="194" y="227" font-family="Arial, sans-serif" font-size="8.5" fill="#555">Gold 20%</text>

  <!-- Fund pros -->
  <text x="130" y="242" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2563eb">✓ Auto-rebalanced · Single SIP · Simpler tax</text>

  <!-- CENTER: Rupee scale balance -->
  <line x1="300" y1="80" x2="300" y2="200" stroke="#ccc" stroke-width="2"/>
  <circle cx="300" cy="80" r="8" fill="#f59e0b"/>
  <text x="300" y="85" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff" font-weight="bold">₹</text>
  <!-- Scale beam -->
  <line x1="260" y1="130" x2="340" y2="130" stroke="#888" stroke-width="2.5"/>
  <!-- Left pan -->
  <line x1="268" y1="130" x2="248" y2="165" stroke="#bbb" stroke-width="1.5"/>
  <line x1="272" y1="130" x2="252" y2="165" stroke="#bbb" stroke-width="1.5"/>
  <rect x="234" y="164" width="32" height="8" rx="3" fill="#e5e7eb" stroke="#ccc" stroke-width="1"/>
  <!-- Right pan -->
  <line x1="328" y1="130" x2="348" y2="165" stroke="#bbb" stroke-width="1.5"/>
  <line x1="332" y1="130" x2="352" y2="165" stroke="#bbb" stroke-width="1.5"/>
  <rect x="334" y="164" width="32" height="8" rx="3" fill="#e5e7eb" stroke="#ccc" stroke-width="1"/>

  <text x="300" y="220" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#aaa">vs</text>

  <!-- RIGHT: DIY Portfolio -->
  <rect x="360" y="50" width="220" height="200" rx="10" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="470" y="74" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#16a34a">DIY Portfolio</text>
  <text x="470" y="87" font-family="Arial, sans-serif" font-size="8.5" text-anchor="middle" fill="#888">Three separate funds</text>

  <!-- Equity icon (bar chart) -->
  <rect x="378" y="102" width="60" height="52" rx="5" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <rect x="388" y="120" width="8" height="24" rx="2" fill="#f97316"/>
  <rect x="400" y="112" width="8" height="32" rx="2" fill="#f97316"/>
  <rect x="412" y="116" width="8" height="28" rx="2" fill="#f97316"/>
  <rect x="424" y="108" width="8" height="36" rx="2" fill="#f97316"/>
  <text x="408" y="165" font-family="Arial, sans-serif" font-size="8.5" text-anchor="middle" fill="#f97316" font-weight="bold">Equity Fund</text>
  <text x="408" y="175" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#888">~60%</text>

  <!-- Debt icon (document/bond) -->
  <rect x="452" y="96" width="60" height="58" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="460" y="106" width="36" height="44" rx="3" fill="#e2e8f0"/>
  <polygon points="490,106 496,112 490,112" fill="#94a3b8"/>
  <line x1="464" y1="120" x2="490" y2="120" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="464" y1="128" x2="490" y2="128" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="464" y1="136" x2="480" y2="136" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="482" y="165" font-family="Arial, sans-serif" font-size="8.5" text-anchor="middle" fill="#64748b" font-weight="bold">Debt Fund</text>
  <text x="482" y="175" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#888">~20%</text>

  <!-- Gold icon (brick/bar) -->
  <rect x="378" y="180" width="135" height="34" rx="5" fill="#fefce8" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="388" y="186" width="45" height="22" rx="3" fill="#f59e0b"/>
  <line x1="388" y1="197" x2="433" y2="197" stroke="#d97706" stroke-width="1"/>
  <line x1="411" y1="186" x2="411" y2="208" stroke="#d97706" stroke-width="1"/>
  <text x="475" y="201" font-family="Arial, sans-serif" font-size="8.5" text-anchor="middle" fill="#b45309" font-weight="bold">Gold Fund  ~20%</text>

  <!-- DIY pros/cons -->
  <text x="470" y="228" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#16a34a">✓ Control · Better tax on debt · Flexible</text>
  <text x="470" y="240" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#ef4444">✗ Manual rebalancing · 3 SIPs needed</text>

  <!-- Bottom comparison bar -->
  <rect x="20" y="258" width="560" height="18" rx="5" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="130" y="271" font-family="Arial, sans-serif" font-size="8.5" text-anchor="middle" fill="#2563eb">Best for: beginners, busy investors</text>
  <text x="300" y="271" font-family="Arial, sans-serif" font-size="8.5" text-anchor="middle" fill="#888">|</text>
  <text x="470" y="271" font-family="Arial, sans-serif" font-size="8.5" text-anchor="middle" fill="#16a34a">Best for: optimizers, tax-aware investors</text>
</svg>
