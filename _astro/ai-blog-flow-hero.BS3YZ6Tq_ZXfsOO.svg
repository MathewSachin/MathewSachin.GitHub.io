<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <!-- Background -->
  <rect width="600" height="200" fill="#ffffff"/>

  <!-- Title -->
  <text x="300" y="26" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#24292f">AI Blog Generation Pipeline</text>

  <!-- === Node 1: Phone / Prompt === -->
  <rect x="18" y="50" width="90" height="90" rx="10" fill="#e8f4fd" stroke="#4a9eda" stroke-width="2"/>
  <!-- Phone outline -->
  <rect x="44" y="60" width="38" height="62" rx="5" fill="#4a9eda"/>
  <rect x="47" y="66" width="32" height="48" rx="2" fill="#1a6da8"/>
  <!-- Home button -->
  <circle cx="63" cy="118" r="3" fill="#c8e6f8"/>
  <!-- Screen content lines -->
  <rect x="50" y="70" width="26" height="2" rx="1" fill="#4fc3f7"/>
  <rect x="50" y="75" width="22" height="2" rx="1" fill="#4fc3f7"/>
  <rect x="50" y="80" width="26" height="2" rx="1" fill="#4fc3f7"/>
  <rect x="50" y="85" width="18" height="2" rx="1" fill="#90caf9"/>
  <!-- Label -->
  <text x="63" y="156" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a6da8">Prompt</text>
  <text x="63" y="170" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">on phone</text>

  <!-- Arrow 1→2 -->
  <line x1="110" y1="95" x2="138" y2="95" stroke="#888" stroke-width="2"/>
  <polygon points="138,90 148,95 138,100" fill="#888"/>

  <!-- === Node 2: AI / Copilot === -->
  <rect x="150" y="50" width="90" height="90" rx="10" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2"/>
  <!-- Copilot circle icon -->
  <circle cx="195" cy="90" r="24" fill="#8b5cf6"/>
  <!-- Stylized robot face -->
  <circle cx="195" cy="90" r="18" fill="#7c3aed"/>
  <circle cx="188" cy="86" r="4" fill="#c4b5fd"/>
  <circle cx="202" cy="86" r="4" fill="#c4b5fd"/>
  <circle cx="189" cy="87" r="2" fill="#1e0a5e"/>
  <circle cx="203" cy="87" r="2" fill="#1e0a5e"/>
  <!-- Smile arc -->
  <path d="M188 96 Q195 102 202 96" fill="none" stroke="#c4b5fd" stroke-width="2"/>
  <!-- Stars/sparkles -->
  <text x="175" y="68" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa">✦</text>
  <text x="210" y="66" font-family="Arial, sans-serif" font-size="8" fill="#a78bfa">✦</text>
  <!-- Label -->
  <text x="195" y="156" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#7c3aed">AI Generates</text>
  <text x="195" y="170" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">via Copilot</text>

  <!-- Arrow 2→3 -->
  <line x1="242" y1="95" x2="270" y2="95" stroke="#888" stroke-width="2"/>
  <polygon points="270,90 280,95 270,100" fill="#888"/>

  <!-- === Node 3: Pull Request === -->
  <rect x="282" y="50" width="90" height="90" rx="10" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <!-- Git branch icon -->
  <!-- Main commit line -->
  <circle cx="316" cy="76" r="6" fill="#4285f4"/>
  <line x1="316" y1="82" x2="316" y2="106" stroke="#4285f4" stroke-width="2"/>
  <circle cx="316" cy="112" r="6" fill="#4285f4"/>
  <!-- Branch line -->
  <line x1="316" y1="83" x2="336" y2="97" stroke="#4285f4" stroke-width="2"/>
  <circle cx="340" cy="100" r="6" fill="#34a853"/>
  <!-- PR badge -->
  <rect x="344" y="70" width="22" height="14" rx="7" fill="#4285f4"/>
  <text x="355" y="80" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#ffffff">PR</text>
  <!-- Label -->
  <text x="327" y="156" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1558d6">Pull Request</text>
  <text x="327" y="170" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">auto-opened</text>

  <!-- Arrow 3→4 -->
  <line x1="374" y1="95" x2="402" y2="95" stroke="#888" stroke-width="2"/>
  <polygon points="402,90 412,95 402,100" fill="#888"/>

  <!-- === Node 4: Review & Merge === -->
  <rect x="414" y="50" width="90" height="90" rx="10" fill="#e6f4ea" stroke="#34a853" stroke-width="2"/>
  <!-- Checkmark circle -->
  <circle cx="459" cy="90" r="26" fill="#34a853"/>
  <polyline points="446,90 456,101 472,79" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Label -->
  <text x="459" y="156" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1e7e34">Merge</text>
  <text x="459" y="170" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">reviewed &amp; merged</text>

  <!-- Arrow 4→5 -->
  <line x1="506" y1="95" x2="534" y2="95" stroke="#888" stroke-width="2"/>
  <polygon points="534,90 544,95 534,100" fill="#888"/>

  <!-- === Node 5: Live Blog === -->
  <rect x="546" y="50" width="90" height="90" rx="10" fill="#e8f4fd" stroke="#4a9eda" stroke-width="2"/>
  <!-- Globe icon -->
  <circle cx="591" cy="88" r="24" fill="none" stroke="#4a9eda" stroke-width="2"/>
  <!-- Latitude lines -->
  <ellipse cx="591" cy="88" rx="14" ry="24" fill="none" stroke="#4a9eda" stroke-width="1.5"/>
  <line x1="567" y1="88" x2="615" y2="88" stroke="#4a9eda" stroke-width="1.5"/>
  <line x1="570" y1="74" x2="612" y2="74" stroke="#4a9eda" stroke-width="1"/>
  <line x1="570" y1="102" x2="612" y2="102" stroke="#4a9eda" stroke-width="1"/>
  <!-- Label -->
  <text x="591" y="156" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a6da8">Live Blog</text>
  <text x="591" y="170" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">GitHub Pages</text>
</svg>
