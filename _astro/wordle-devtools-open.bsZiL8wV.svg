<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <!-- Browser window -->
  <rect width="600" height="360" rx="8" fill="#f1f3f4" stroke="#dadce0" stroke-width="1"/>
  <!-- Title bar -->
  <rect width="600" height="40" rx="8" fill="#3c4043"/>
  <rect x="0" y="32" width="600" height="8" fill="#3c4043"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="7" fill="#ff5f56"/>
  <circle cx="42" cy="20" r="7" fill="#ffbd2e"/>
  <circle cx="64" cy="20" r="7" fill="#27c93f"/>
  <!-- Address bar -->
  <rect x="90" y="8" width="420" height="24" rx="12" fill="#ffffff"/>
  <text x="300" y="24" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#5f6368">nytimes.com/games/wordle/index.html</text>
  <!-- Webpage content area -->
  <rect x="0" y="40" width="370" height="320" fill="#ffffff"/>
  <!-- Wordle mini grid in page -->
  <text x="185" y="75" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1b">Wordle</text>
  <rect x="125" y="85" width="30" height="30" rx="2" fill="#6aaa64"/>
  <rect x="160" y="85" width="30" height="30" rx="2" fill="#6aaa64"/>
  <rect x="195" y="85" width="30" height="30" rx="2" fill="#6aaa64"/>
  <rect x="230" y="85" width="30" height="30" rx="2" fill="#6aaa64"/>
  <rect x="265" y="85" width="30" height="30" rx="2" fill="#6aaa64"/>
  <text x="140" y="107" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">C</text>
  <text x="175" y="107" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">R</text>
  <text x="210" y="107" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">A</text>
  <text x="245" y="107" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">N</text>
  <text x="280" y="107" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">E</text>

  <!-- DevTools panel -->
  <rect x="370" y="40" width="230" height="320" fill="#1e1e1e"/>
  <!-- DevTools header tabs -->
  <rect x="370" y="40" width="230" height="30" fill="#292929"/>
  <text x="390" y="60" font-family="Arial, sans-serif" font-size="10" fill="#9e9e9e">Elements</text>
  <text x="448" y="60" font-family="Arial, sans-serif" font-size="10" fill="#9e9e9e">Console</text>
  <text x="502" y="60" font-family="Arial, sans-serif" font-size="10" fill="#9e9e9e">Network</text>
  <text x="554" y="60" font-family="Arial, sans-serif" font-size="10" fill="#9e9e9e">...</text>
  <!-- DevTools content -->
  <text x="382" y="90" font-family="monospace" font-size="10" fill="#569cd6">&lt;html&gt;</text>
  <text x="390" y="106" font-family="monospace" font-size="10" fill="#569cd6">&lt;head&gt;</text>
  <text x="390" y="122" font-family="monospace" font-size="10" fill="#569cd6">&lt;/head&gt;</text>
  <text x="390" y="138" font-family="monospace" font-size="10" fill="#569cd6">&lt;body&gt;</text>
  <text x="398" y="154" font-family="monospace" font-size="10" fill="#9cdcfe">&lt;div id="app"&gt;</text>
  <text x="406" y="170" font-family="monospace" font-size="10" fill="#ce9178">...</text>
  <text x="398" y="186" font-family="monospace" font-size="10" fill="#9cdcfe">&lt;/div&gt;</text>
  <text x="390" y="202" font-family="monospace" font-size="10" fill="#569cd6">&lt;/body&gt;</text>
  <text x="382" y="218" font-family="monospace" font-size="10" fill="#569cd6">&lt;/html&gt;</text>

  <!-- F12 key hint -->
  <rect x="130" y="280" width="110" height="36" rx="6" fill="#1a73e8"/>
  <text x="185" y="303" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">Press F12</text>

  <!-- Arrow pointing to DevTools -->
  <line x1="280" y1="298" x2="365" y2="160" stroke="#fbbc04" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="365,160 358,172 370,168" fill="#fbbc04"/>
</svg>
