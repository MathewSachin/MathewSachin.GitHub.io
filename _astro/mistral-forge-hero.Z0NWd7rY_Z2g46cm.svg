<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <radialGradient id="forgeFire" cx="50%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#ff6b00"/>
      <stop offset="50%" stop-color="#cc3300"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </radialGradient>
    <radialGradient id="modelGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#312e81"/>
    </radialGradient>
    <filter id="forgeGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="280" fill="#0a0a14"/>

  <!-- Section: Raw Data (left) -->
  <text x="75" y="22" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#888" font-weight="bold">RAW DATA</text>

  <!-- Document icons -->
  <!-- Doc 1 -->
  <rect x="22" y="32" width="42" height="52" rx="3" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <polygon points="52,32 64,44 52,44" fill="#2a5a9f"/>
  <line x1="28" y1="52" x2="58" y2="52" stroke="#4a7abf" stroke-width="1.5"/>
  <line x1="28" y1="60" x2="58" y2="60" stroke="#4a7abf" stroke-width="1.5"/>
  <line x1="28" y1="68" x2="48" y2="68" stroke="#4a7abf" stroke-width="1.5"/>

  <!-- Doc 2 -->
  <rect x="72" y="28" width="42" height="52" rx="3" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <polygon points="102,28 114,40 102,40" fill="#2a5a9f"/>
  <line x1="78" y1="48" x2="108" y2="48" stroke="#4a7abf" stroke-width="1.5"/>
  <line x1="78" y1="56" x2="108" y2="56" stroke="#4a7abf" stroke-width="1.5"/>
  <line x1="78" y1="64" x2="98" y2="64" stroke="#4a7abf" stroke-width="1.5"/>

  <!-- Doc 3 -->
  <rect x="22" y="98" width="42" height="52" rx="3" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <polygon points="52,98 64,110 52,110" fill="#2a5a9f"/>
  <line x1="28" y1="118" x2="58" y2="118" stroke="#4a7abf" stroke-width="1.5"/>
  <line x1="28" y1="126" x2="58" y2="126" stroke="#4a7abf" stroke-width="1.5"/>
  <line x1="28" y1="134" x2="48" y2="134" stroke="#4a7abf" stroke-width="1.5"/>

  <!-- Doc 4 -->
  <rect x="72" y="94" width="42" height="52" rx="3" fill="#1e3a5f" stroke="#2a5a9f" stroke-width="1"/>
  <polygon points="102,94 114,106 102,106" fill="#2a5a9f"/>
  <line x1="78" y1="114" x2="108" y2="114" stroke="#4a7abf" stroke-width="1.5"/>
  <line x1="78" y1="122" x2="108" y2="122" stroke="#4a7abf" stroke-width="1.5"/>
  <line x1="78" y1="130" x2="98" y2="130" stroke="#4a7abf" stroke-width="1.5"/>

  <text x="75" y="168" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#4a7abf">Your proprietary data</text>

  <!-- Arrow to forge -->
  <line x1="122" y1="95" x2="168" y2="95" stroke="#cc5500" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="168,88 182,95 168,102" fill="#cc5500"/>

  <!-- Forge / Furnace (center) -->
  <!-- Furnace body -->
  <rect x="185" y="50" width="110" height="110" rx="8" fill="#1a0800" stroke="#cc4400" stroke-width="2"/>
  <!-- Furnace door -->
  <rect x="200" y="70" width="80" height="70" rx="6" fill="#330d00" stroke="#ff6600" stroke-width="1.5"/>
  <!-- Fire inside -->
  <ellipse cx="240" cy="140" rx="30" ry="10" fill="#ff4400" opacity="0.6"/>
  <path d="M220,135 Q228,105 240,95 Q248,105 235,118 Q250,100 255,80 Q265,100 258,120 Q265,108 268,130 Q255,125 255,140 L220,140 Z" fill="url(#forgeFire)" filter="url(#forgeGlow)" opacity="0.9"/>
  <!-- Furnace chimney -->
  <rect x="222" y="30" width="10" height="25" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <rect x="248" y="36" width="10" height="20" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <!-- Smoke puffs -->
  <circle cx="227" cy="25" r="6" fill="#444" opacity="0.6"/>
  <circle cx="233" cy="18" r="5" fill="#333" opacity="0.4"/>
  <circle cx="253" cy="32" r="5" fill="#444" opacity="0.5"/>

  <text x="240" y="178" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#ff6600">MISTRAL FORGE</text>
  <text x="240" y="191" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#885522">Pre-train · Fine-tune · RLHF</text>

  <!-- Arrow to AI model -->
  <line x1="298" y1="105" x2="344" y2="105" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="344,98 358,105 344,112" fill="#6366f1"/>

  <!-- AI Model (right) - glowing cube / neural network icon -->
  <text x="470" y="22" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#888" font-weight="bold">YOUR MODEL</text>

  <!-- 3D cube effect for AI model -->
  <!-- Front face -->
  <rect x="400" y="45" width="90" height="90" rx="6" fill="url(#modelGlow)" stroke="#818cf8" stroke-width="2" filter="url(#forgeGlow)"/>
  <!-- Neural network nodes -->
  <circle cx="420" cy="68" r="5" fill="#a5b4fc"/>
  <circle cx="445" cy="60" r="5" fill="#a5b4fc"/>
  <circle cx="470" cy="68" r="5" fill="#a5b4fc"/>
  <circle cx="420" cy="90" r="5" fill="#a5b4fc"/>
  <circle cx="445" cy="90" r="5" fill="#c4b5fd"/>
  <circle cx="470" cy="90" r="5" fill="#a5b4fc"/>
  <circle cx="420" cy="112" r="5" fill="#a5b4fc"/>
  <circle cx="445" cy="120" r="5" fill="#a5b4fc"/>
  <circle cx="470" cy="112" r="5" fill="#a5b4fc"/>
  <!-- Connection lines -->
  <line x1="420" y1="68" x2="445" y2="90" stroke="#818cf8" stroke-width="1" opacity="0.6"/>
  <line x1="445" y1="60" x2="445" y2="90" stroke="#818cf8" stroke-width="1" opacity="0.6"/>
  <line x1="470" y1="68" x2="445" y2="90" stroke="#818cf8" stroke-width="1" opacity="0.6"/>
  <line x1="445" y1="90" x2="420" y2="112" stroke="#818cf8" stroke-width="1" opacity="0.6"/>
  <line x1="445" y1="90" x2="445" y2="120" stroke="#818cf8" stroke-width="1" opacity="0.6"/>
  <line x1="445" y1="90" x2="470" y2="112" stroke="#818cf8" stroke-width="1" opacity="0.6"/>
  <line x1="420" y1="68" x2="470" y2="68" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
  <line x1="420" y1="112" x2="470" y2="112" stroke="#818cf8" stroke-width="1" opacity="0.4"/>

  <text x="445" y="168" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#818cf8">Domain-trained · Private · Frontier</text>

  <!-- Formula label -->
  <rect x="90" y="202" width="420" height="26" rx="6" fill="#100d1f" stroke="#3730a3" stroke-width="1"/>
  <text x="300" y="219" font-family="Arial, sans-serif" font-size="10.5" text-anchor="middle" fill="#a5b4fc">Your Data  +  Mistral Training  =  Your Model</text>

  <!-- Partners row -->
  <text x="300" y="248" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#555">Launch partners:</text>
  <text x="130" y="265" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#6366f1" font-weight="bold">ASML</text>
  <text x="220" y="265" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#6366f1" font-weight="bold">Ericsson</text>
  <text x="300" y="265" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#6366f1" font-weight="bold">ESA</text>
  <text x="380" y="265" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#6366f1" font-weight="bold">DSO Singapore</text>
  <text x="475" y="265" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#6366f1" font-weight="bold">Reply</text>
</svg>
