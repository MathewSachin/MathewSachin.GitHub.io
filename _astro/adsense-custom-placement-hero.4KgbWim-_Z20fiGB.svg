<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="720" height="320" fill="#f8f9fa" rx="12"/>

  <!-- Left panel: Auto Ads -->
  <rect x="20" y="20" width="320" height="280" fill="#fff" rx="8" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="180" y="50" text-anchor="middle" font-size="13" font-weight="700" fill="#495057">AdSense Auto Ads</text>
  <text x="180" y="66" text-anchor="middle" font-size="10" fill="#adb5bd">Google decides placement</text>

  <!-- Left: content blocks -->
  <rect x="36" y="80" width="200" height="10" fill="#dee2e6" rx="3"/>
  <rect x="36" y="96" width="170" height="10" fill="#dee2e6" rx="3"/>

  <!-- Left: intrusive ad mid-paragraph -->
  <rect x="36" y="112" width="288" height="28" fill="#fff3cd" rx="4" stroke="#ffc107" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="180" y="129" text-anchor="middle" font-size="9" fill="#856404">📢 Ad injected here (mid-paragraph)</text>

  <rect x="36" y="148" width="210" height="10" fill="#dee2e6" rx="3"/>
  <rect x="36" y="164" width="180" height="10" fill="#dee2e6" rx="3"/>

  <!-- Left: ad inside code block area -->
  <rect x="36" y="182" width="288" height="22" fill="#f8d7da" rx="3" stroke="#f5c2c7" stroke-width="1"/>
  <text x="47" y="196" font-size="8" fill="#842029" font-family="monospace">const x = 1; /* ← Ad squeezed into code */</text>

  <!-- Left: another ad in weird spot -->
  <rect x="36" y="212" width="288" height="28" fill="#fff3cd" rx="4" stroke="#ffc107" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="180" y="229" text-anchor="middle" font-size="9" fill="#856404">📢 Another ad (too close to previous)</text>

  <rect x="36" y="248" width="190" height="10" fill="#dee2e6" rx="3"/>
  <rect x="36" y="264" width="160" height="10" fill="#dee2e6" rx="3"/>

  <!-- Right panel: Custom Placement -->
  <rect x="380" y="20" width="320" height="280" fill="#fff" rx="8" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="540" y="50" text-anchor="middle" font-size="13" font-weight="700" fill="#495057">Custom Ad Placement</text>
  <text x="540" y="66" text-anchor="middle" font-size="10" fill="#adb5bd">Injected every 7 content elements</text>

  <!-- Right: content -->
  <rect x="396" y="80" width="200" height="10" fill="#dee2e6" rx="3"/>
  <rect x="396" y="96" width="170" height="10" fill="#dee2e6" rx="3"/>
  <rect x="396" y="112" width="210" height="10" fill="#dee2e6" rx="3"/>
  <rect x="396" y="128" width="180" height="10" fill="#dee2e6" rx="3"/>
  <rect x="396" y="144" width="200" height="10" fill="#dee2e6" rx="3"/>

  <!-- Right: clean ad after 7 elements -->
  <rect x="396" y="162" width="288" height="30" fill="#d1e7dd" rx="5" stroke="#a3cfbb" stroke-width="1.5"/>
  <text x="540" y="180" text-anchor="middle" font-size="9" font-weight="600" fill="#0a3622">Advertisement</text>
  <text x="540" y="191" text-anchor="middle" font-size="8" fill="#146c43">✓ Between paragraphs, never inside content</text>

  <!-- Right: more content -->
  <rect x="396" y="202" width="200" height="10" fill="#dee2e6" rx="3"/>
  <rect x="396" y="218" width="170" height="10" fill="#dee2e6" rx="3"/>
  <rect x="396" y="234" width="190" height="10" fill="#dee2e6" rx="3"/>
  <rect x="396" y="250" width="210" height="10" fill="#dee2e6" rx="3"/>
  <rect x="396" y="266" width="160" height="10" fill="#dee2e6" rx="3"/>

  <!-- Divider -->
  <line x1="360" y1="20" x2="360" y2="300" stroke="#dee2e6" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- VS label -->
  <circle cx="360" cy="160" r="18" fill="#6c757d"/>
  <text x="360" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">VS</text>
</svg>
