---
layout: page
title: Tools
ads: false
---

<link rel="stylesheet" href="{{ '/styles/blog.css' | relative_url }}">

<div class="home-cards-section">
  <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-3">
    {% for tool in site.data.tools %}
    <div class="col">
      <a href="{{ '/tools/' | append: tool.id | relative_url }}" class="home-card-link" aria-label="{{ tool.name }}">
        <div class="card h-100">
          <div class="card-body">
            <p class="card-title mb-1">
              <span {% if tool.accent_color %} style="color: {{ tool.accent_color }};"{% else %} class="text-info"{% endif %}>
                <i class="{{ tool.icon }} me-2" aria-hidden="true"></i>
                <span>{{ tool.name }}</span>
              </span>
            </p>
            <p class="card-text">{{ tool.description }}</p>
          </div>
          <div class="card-footer">
            <small><i class="fas fa-arrow-right me-1"></i>Open tool</small>
          </div>
        </div>
      </a>
    </div>
    {% endfor %}
  </div>
</div>
