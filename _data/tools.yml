- id: timestamp
  name: Timestamp Converter
  description: Convert between Unix epoch and human-readable timestamps.
  icon: fas fa-clock
  quick_tool: true

- id: base64
  name: Base64 Encoder / Decoder
  description: Encode plain text to Base64 or decode Base64 back to text.
  icon: fas fa-code
  quick_tool: true

- id: json
  name: JSON Formatter & Validator
  description: Format, minify, and validate JSON documents.
  icon: fas fa-file-code
  quick_tool: true

- id: cron
  name: CRON Expression Generator
  description: Build CRON expressions from frequency dropdowns — minute, hour, day, week, or month.
  icon: fas fa-calendar-days
  quick_tool: true

- id: hash
  name: Hash Generator
  description: Generate MD5, SHA-1, and SHA-256 hashes from any input text.
  icon: fas fa-hashtag
  quick_tool: true

- id: scratchpad
  name: Smart Scratchpad
  description: Distraction-free notepad that auto-saves every keystroke. Instantly strips formatting from pasted text.
  icon: fas fa-pencil
  quick_tool: true

- id: imgcompress
  name: Image Compressor
  description: Compress and convert images to JPEG, PNG, or WebP entirely in your browser — powered by ImageMagick WebAssembly.
  icon: fas fa-image
  quick_tool: true

- id: llm
  name: Local LLM Chat
  description: Chat with a local language model that runs entirely in your browser — powered by Transformers.js WebAssembly. No data sent to any server.
  icon: fas fa-robot
  quick_tool: true

- id: tokenizer
  name: AI Tokenizer & Cost Calculator
  description: Visualize how AI models tokenize your text with colour-coded token boundaries, and calculate the real-time API cost across GPT-4o, Claude, and Gemini.
  icon: fas fa-microchip

- id: bookmarklet
  name: Bookmarklet Compiler
  description: Minify and compile raw JavaScript into a drag-and-drop bookmarklet — strips comments, compresses whitespace, and URI-encodes for the browser.
  icon: fas fa-bookmark

- id: captura
  name: Captura Web Recorder
  description: Record your screen with webcam overlay and microphone audio — streams directly to disk. Runs entirely in your browser, no data sent to any server.
  icon: fas fa-video

- id: yt-thumbnail
  name: YouTube Thumbnail Grabber
  description: Instantly fetch the full-resolution thumbnail of any YouTube video — paste any YouTube URL or video ID and download the raw JPG.
  icon: fab fa-youtube
  accent_color: "#CC0000"
