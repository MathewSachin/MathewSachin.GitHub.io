browser-hacks:
  name: "Browser Hacks"
  url: "/blog/series/browser-hacks/"
  description: >
    An 18-part series that takes you from your very first <kbd>F12</kbd> press all the way
    to writing persistent browser scripts. Every technique builds on the last.
    Most chapters need nothing but a browser and a curious mind — the final chapter
    adds Tampermonkey to make your scripts persistent.
  levels:
    - title: "Level 1 — Zero Coding Required"
      icon: "fas fa-seedling"
      intro: >
        You don't need to know a single line of code to start here. These two tricks use the
        browser's built-in inspector — the same tool professional web developers use every day.
        Your only job is to press <kbd>F12</kbd> and click.
      posts:
        - id: "/blog/2026/03/07/edit-webpage-inspect-element"
          blurb: 'Make any website say whatever you want in about ten seconds — great for pranks. Teaches: the DOM, <code>document.designMode</code>.'
        - id: "/blog/2019/12/07/unhide-password-box"
          blurb: "Your browser auto-filled a password and you can't remember it. One attribute change fixes that. Teaches: HTML <code>type</code> attributes, Inspect Element."

    - title: "Level 2 — Your First Console Scripts"
      icon: "fas fa-terminal"
      intro: >
        Time to open the JavaScript Console and type commands that actually change how a game
        works. These three posts introduce variables, objects, automation loops, and event
        simulation — core concepts you will use in every subsequent post.
      posts:
        - id: "/blog/2016/11/05/chrome-dino-hack"
          blurb: "Set an immortal dino, freeze the score counter, and get a free high score in one console command. Teaches: JS objects, property assignment, the Console tab."
        - id: "/blog/2026/03/07/hacking-wordle"
          blurb: "Solve Wordle on your very first guess every day. Teaches: the Network tab, <code>localStorage</code>, reading game state from the browser's own memory."
        - id: "/blog/2026/03/14/chrome-dino-autoplay"
          blurb: "Write a bot that plays the Dino game indefinitely — zero keystrokes from you after launch. Teaches: <code>setInterval</code>, event dispatching, reading live game state."

    - title: "Level 3 — Advanced Game Manipulation"
      icon: "fas fa-chess-knight"
      intro: >
        You have the basics. Now go deeper. These three posts show you how to override the
        browser's own built-in functions, build bots that mimic human behaviour convincingly,
        and exploit intentional backdoors that developers accidentally (or not so accidentally) left inside
        their own code.
      posts:
        - id: "/blog/2026/03/20/hacking-minesweeper-online"
          blurb: 'Guarantee a safe first click — every time — by controlling which numbers the browser considers "random". Teaches: monkey-patching <code>Math.random</code>, prototype overrides.'
        - id: "/blog/2026/03/20/hacking-typeracer"
          blurb: "Finish a TypeRacer race at a perfectly human 85 WPM without typing more than one key yourself. Teaches: async automation, timing jitter, DOM input simulation."
        - id: "/blog/2026/03/20/cookie-clicker-hacks"
          blurb: "Three separate ways to break Cookie Clicker — including a backdoor the developer left inside the game on purpose. Teaches: global API surfaces, <code>Game</code> object, developer-mode hooks."

    - title: "Level 4 — CSS Injection &amp; Bookmarklets"
      icon: "fas fa-mobile-alt"
      intro: >
        Typing into the Console every time gets old fast. Bookmarklets let you save a hack as
        a browser bookmark and run it with a single tap — even on mobile where DevTools doesn't
        exist at all. This section also covers CSS injection to change how websites look and feel.
      posts:
        - id: "/blog/2026/03/19/brute-force-dark-mode"
          blurb: 'Force any website into dark mode in two seconds on both desktop and mobile. Teaches: CSS <code>filter</code> injection, <code>invert()</code>, <code>hue-rotate()</code>, the <code>&lt;style&gt;</code> injection pattern.'
        - id: "/blog/2026/03/19/chrome-dino-hack-mobile-bookmarklet"
          blurb: 'Apply the Dino hacks from Part 3 on your phone — no computer, no DevTools. Teaches: bookmarklets, <code>javascript:</code> URLs, mobile browser address-bar tricks.'
        - id: "/blog/2026/03/19/hacking-wordle-mobile-bookmarklet"
          blurb: "Apply the Wordle hack from Part 4 on your phone with a single bookmark tap. Teaches: packaging complex scripts as a bookmarklet, URL encoding."

    - title: "Level 5 — Network Sniffing &amp; Media Downloading"
      icon: "fas fa-satellite-dish"
      intro: >
        Now the serious power moves. These posts show you how to intercept network traffic,
        inspect the browser's internal data structures, use platform JSON APIs, and ultimately
        write a fully persistent userscript — a mini browser extension you author yourself.
        Each platform teaches a different angle of the same underlying skill.
      posts:
        - id: "/blog/2026/03/21/save-instagram-photos"
          blurb: "Instagram disables right-click on photos. This script strips the CSS lock — and keeps stripping it as you scroll and new posts load. Teaches: <code>MutationObserver</code>, CSS pointer-events."
        - id: "/blog/2026/03/21/instagram-reel-sniper"
          blurb: "Instagram has no download button for Reels. This script adds one right in the browser. Teaches: Network tab sniffing, <code>fetch()</code> with Blob, dynamic anchor download."
        - id: "/blog/2026/03/21/youtube-shorts-sniper"
          blurb: "YouTube Shorts have a structural blind spot in their architecture that makes them easier to download than regular YouTube videos. Teaches: <code>&lt;video&gt;</code> element <code>src</code> extraction, Shorts player quirks."
        - id: "/blog/2026/03/21/twitter-x-video-sniper"
          blurb: "Twitter/X has never offered a download button. This script captures any playing video. Teaches: HLS stream identification, MediaSource API basics, blob URL capture."
        - id: "/blog/2026/03/22/reddit-video-sniper"
          blurb: 'Reddit hides its own JSON API in plain sight — just append <code>.json</code> to any post URL. Teaches: public JSON API exploitation, <code>v.redd.it</code> CDN structure, programmatic fetch + download.'
        - id: "/blog/2026/03/22/instagram-story-sniper"
          blurb: "Instagram Stories vanish after 24 hours and there's no Save button anywhere. This script reaches into the browser's React fiber tree to pull the original CDN URL. Teaches: React internal fibers, <code>__reactFiber</code> traversal."
        - id: "/blog/2026/03/30/instagram-userscript-download-buttons"
          blurb: "All three Instagram techniques bundled into one persistent userscript that injects a ⬇ button directly into the Instagram UI. Teaches: Tampermonkey/Greasemonkey userscripts, <code>@grant</code> directives, persistent DOM injection."
