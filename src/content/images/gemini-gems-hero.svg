<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
  <!-- Overall app window -->
  <rect width="600" height="320" rx="10" fill="#f1f3f4"/>

  <!-- Title bar -->
  <rect width="600" height="36" rx="10" fill="#202124"/>
  <rect x="0" y="20" width="600" height="16" fill="#202124"/>
  <circle cx="18" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="36" cy="18" r="6" fill="#febc2e"/>
  <circle cx="54" cy="18" r="6" fill="#28c840"/>
  <text x="300" y="23" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#aaa">Gemini</text>

  <!-- Left sidebar -->
  <rect x="0" y="36" width="165" height="284" fill="#1a1a2e"/>

  <!-- Sidebar header -->
  <text x="83" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#9aa0b4">MY GEMS</text>
  <line x1="12" y1="68" x2="153" y2="68" stroke="#333" stroke-width="1"/>

  <!-- Gem 1: Code Reviewer -->
  <rect x="10" y="76" width="145" height="38" rx="6" fill="#2a2a3e"/>
  <polygon points="28,85 36,95 28,105 20,95" fill="#4285f4" opacity="0.9"/>
  <polygon points="28,85 36,95 28,90" fill="#1a5ccc" opacity="0.7"/>
  <text x="44" y="98" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" font-weight="bold">Code Reviewer</text>
  <text x="44" y="109" font-family="Arial, sans-serif" font-size="8" fill="#888">Reviews PRs &amp; suggests fixes</text>

  <!-- Gem 2: Blog Writer (highlighted/selected) -->
  <rect x="10" y="120" width="145" height="38" rx="6" fill="#3c2a5e" stroke="#8a56e8" stroke-width="1.5"/>
  <polygon points="28,129 36,139 28,149 20,139" fill="#a142f4" opacity="0.9"/>
  <polygon points="28,129 36,139 28,134" fill="#7a1cc0" opacity="0.7"/>
  <text x="44" y="142" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" font-weight="bold">Blog Writer</text>
  <text x="44" y="153" font-family="Arial, sans-serif" font-size="8" fill="#ccc">Drafts in my voice &amp; style</text>

  <!-- Gem 3: Data Analyst -->
  <rect x="10" y="164" width="145" height="38" rx="6" fill="#2a2a3e"/>
  <polygon points="28,173 36,183 28,193 20,183" fill="#34a853" opacity="0.9"/>
  <polygon points="28,173 36,183 28,178" fill="#1a7a2a" opacity="0.7"/>
  <text x="44" y="186" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" font-weight="bold">Data Analyst</text>
  <text x="44" y="197" font-family="Arial, sans-serif" font-size="8" fill="#888">Turns data into insights</text>

  <!-- Gem 4: Email Assistant -->
  <rect x="10" y="208" width="145" height="38" rx="6" fill="#2a2a3e"/>
  <polygon points="28,217 36,227 28,237 20,227" fill="#ea4335" opacity="0.9"/>
  <polygon points="28,217 36,227 28,222" fill="#b41c0c" opacity="0.7"/>
  <text x="44" y="230" font-family="Arial, sans-serif" font-size="10" fill="#e0e0e0" font-weight="bold">Email Assistant</text>
  <text x="44" y="241" font-family="Arial, sans-serif" font-size="8" fill="#888">Crisp professional replies</text>

  <!-- + New Gem button -->
  <rect x="10" y="258" width="145" height="30" rx="6" fill="#2a2a3e" stroke="#444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="83" y="278" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">+ Create Gem</text>

  <!-- Main chat area -->
  <rect x="165" y="36" width="435" height="284" fill="#ffffff"/>

  <!-- Chat header -->
  <rect x="165" y="36" width="435" height="44" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="0" />
  <line x1="165" y1="80" x2="600" y2="80" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Gem icon in header -->
  <polygon points="196,48 204,58 196,68 188,58" fill="#a142f4"/>
  <polygon points="196,48 204,58 196,53" fill="#7a1cc0"/>
  <text x="214" y="62" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Blog Writer</text>
  <text x="214" y="74" font-family="Arial, sans-serif" font-size="9" fill="#888">Knows your style · No preamble needed</text>

  <!-- AI message bubble -->
  <rect x="175" y="92" width="310" height="56" rx="8" fill="#f1f3ff" stroke="#d0d8ff" stroke-width="1"/>
  <polygon points="192,48 200,58 192,68 184,58" fill="none"/>
  <circle cx="189" cy="108" r="8" fill="#a142f4"/>
  <polygon points="189,101 194,108 189,115 184,108" fill="#fff" opacity="0.8" transform="scale(0.5) translate(189,108)"/>
  <text x="204" y="109" font-family="Arial, sans-serif" font-size="9" fill="#444">Hey! Ready to write. Just tell me the topic —</text>
  <text x="204" y="122" font-family="Arial, sans-serif" font-size="9" fill="#444">I already know your tone, audience, and structure.</text>
  <text x="204" y="135" font-family="Arial, sans-serif" font-size="9" fill="#888">No need to re-explain anything.</text>

  <!-- User message -->
  <rect x="310" y="158" width="270" height="38" rx="8" fill="#4285f4"/>
  <text x="445" y="175" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#fff">Write a post about Python's new JIT compiler</text>
  <text x="445" y="188" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#cce0ff">— keep it accessible, add examples</text>

  <!-- AI response -->
  <rect x="175" y="208" width="350" height="78" rx="8" fill="#f1f3ff" stroke="#d0d8ff" stroke-width="1"/>
  <text x="191" y="224" font-family="Arial, sans-serif" font-size="9" fill="#444" font-weight="bold">Here's a draft in your casual-technical style:</text>
  <text x="191" y="238" font-family="Arial, sans-serif" font-size="8.5" fill="#555">**Python's JIT Is Finally Fast** — for years, if someone</text>
  <text x="191" y="250" font-family="Arial, sans-serif" font-size="8.5" fill="#555">asked whether Python's JIT was worth using, the honest</text>
  <text x="191" y="262" font-family="Arial, sans-serif" font-size="8.5" fill="#555">answer was "not really." That changed in 3.15...</text>
  <text x="191" y="278" font-family="Arial, sans-serif" font-size="8" fill="#a142f4">✦ Continues in your voice · No boilerplate intro</text>
</svg>
