<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" width="640" height="280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="trackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
    <linearGradient id="finishGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="anthropicGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="openaiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="xaiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="280" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="320" y="38" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#f8fafc" text-anchor="middle">THE AI IPO RACE</text>
  <text x="320" y="57" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Three companies. One IPO window. Winner takes all.</text>

  <!-- Track lanes -->
  <rect x="60" y="75" width="480" height="38" fill="url(#trackGrad)" rx="4" opacity="0.5"/>
  <rect x="60" y="123" width="480" height="38" fill="url(#trackGrad)" rx="4" opacity="0.5"/>
  <rect x="60" y="171" width="480" height="38" fill="url(#trackGrad)" rx="4" opacity="0.5"/>

  <!-- Finish line -->
  <rect x="530" y="70" width="10" height="148" fill="url(#finishGrad)" rx="2"/>
  <text x="535" y="65" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle" font-weight="700">IPO</text>

  <!-- Checkered pattern on finish -->
  <rect x="530" y="70" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="535" y="78" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="530" y="86" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="535" y="94" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="530" y="102" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="535" y="110" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="530" y="118" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="535" y="126" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="530" y="134" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="535" y="142" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="530" y="150" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="535" y="158" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="530" y="166" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="535" y="174" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="530" y="182" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="535" y="190" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="530" y="198" width="5" height="8" fill="#f8fafc" opacity="0.7"/>
  <rect x="535" y="206" width="5" height="8" fill="#f8fafc" opacity="0.7"/>

  <!-- Anthropic bar (leading - 78%) -->
  <rect x="65" y="80" width="374" height="28" fill="url(#anthropicGrad)" rx="4"/>
  <text x="75" y="99" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff">Anthropic</text>
  <text x="430" y="99" font-family="system-ui, sans-serif" font-size="10" fill="#dcfce7">$19B ARR · Claude Code 🔥</text>

  <!-- OpenAI bar (second - 60%) -->
  <rect x="65" y="128" width="288" height="28" fill="url(#openaiGrad)" rx="4"/>
  <text x="75" y="147" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff">OpenAI</text>
  <text x="345" y="147" font-family="system-ui, sans-serif" font-size="10" fill="#e0e7ff">$25B ARR · Focus mode 📉</text>

  <!-- xAI bar (third - 42%) -->
  <rect x="65" y="176" width="202" height="28" fill="url(#xaiGrad)" rx="4"/>
  <text x="75" y="195" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff">xAI</text>
  <text x="260" y="195" font-family="system-ui, sans-serif" font-size="10" fill="#cbd5e1">+ Starlink 🚀</text>

  <!-- Bottom caption -->
  <text x="320" y="245" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">While OpenAI hires ex-Facebookers to juice engagement metrics...</text>
  <text x="320" y="262" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">...Anthropic quietly doubled its revenue in two months.</text>
</svg>
