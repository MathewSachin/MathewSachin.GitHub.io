name: Build Search Index

on:
  push:
    branches: [main, master]
    paths:
      - 'blog/_posts/**'
      - 'scripts/build-search-index.mjs'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Orama bundle and search index
        run: npm run build

      - name: Commit updated files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/orama.js search-index.json
          git diff --staged --quiet || git commit -m "chore: update Orama bundle and search index [skip ci]"
          git push
