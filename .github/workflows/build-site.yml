name: Build Site

on:
  workflow_call:
    inputs:
      baseurl:
        description: 'Optional baseurl to inject into _config.yml'
        type: string
        default: ''
      preview:
        description: 'Whether this is a PR preview build (disables Google Analytics)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Orama bundle and search index
        run: npm run build

      - name: Set baseurl
        if: inputs.baseurl != ''
        env:
          BASEURL: ${{ inputs.baseurl }}
        run: |
          echo "baseurl: $BASEURL" >> _config.yml

      - name: Disable Google Analytics for preview
        if: inputs.preview
        run: |
          echo "google-analytics: false" >> _config.yml

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Install libvips for image processing
        run: sudo apt-get install -y libvips-dev

      - name: Build Jekyll site
        run: JEKYLL_ENV=production bundle exec jekyll build --destination ./_site

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: ./_site
