name: Build Site

on:
  workflow_call:
    inputs:
      baseurl:
        description: 'Optional base URL for PR previews (e.g. /pr-preview/pr-42)'
        type: string
        default: ''
      testing:
        description: 'Whether this is a testing build (disables AdSense and Analytics)'
        type: boolean
        default: false
      artifact_name:
        description: 'Name of the uploaded site artifact'
        type: string
        default: 'site'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build Astro site
        env:
          ASTRO_BASE: ${{ inputs.baseurl }}
          NODE_ENV: ${{ inputs.testing && 'development' || 'production' }}
        run: npm run build

      - name: Verify search index
        run: test -f public/search-index.json || { echo "public/search-index.json was not generated"; exit 1; }

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ./dist
