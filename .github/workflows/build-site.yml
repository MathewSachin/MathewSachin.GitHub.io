name: Build Site

on:
  workflow_call:
    inputs:
      baseurl:
        description: 'Optional baseurl to inject into _config.yml'
        type: string
        default: ''
      preview:
        description: 'Whether this is a PR preview build (disables Google Analytics)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mathewsachin/mathewsachin-github-io-ci:latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: npm ci

      - name: Build Orama bundle and search index
        run: npm run build

      - name: Set baseurl
        if: inputs.baseurl != ''
        env:
          BASEURL: ${{ inputs.baseurl }}
        run: |
          echo "baseurl: $BASEURL" >> _config.yml

      - name: Disable Google Analytics for preview
        if: inputs.preview
        run: |
          echo "google-analytics: false" >> _config.yml

      - name: Diagnose libvips
        run: |
          echo "=== LD_LIBRARY_PATH ==="
          echo "${LD_LIBRARY_PATH:-UNSET}"
          echo "=== ldconfig libvips ==="
          ldconfig -p | grep -i vips || echo "NOT IN LDCONFIG"
          echo "=== libvips files on disk ==="
          find /usr /lib -name "libvips*" 2>/dev/null || echo "NONE FOUND"
          echo "=== /etc/ld.so.conf.d ==="
          cat /etc/ld.so.conf.d/*.conf 2>/dev/null || echo "NONE"

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: ${{ runner.os }}-gems-

      - name: Install Ruby gems
        run: bundle config set path 'vendor/bundle' && bundle install

      - name: Build Jekyll site
        env:
          JEKYLL_ENV: production
          LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
        run: bundle exec jekyll build --destination ./_site

      - name: Run html-proofer
        env:
          BASEURL: ${{ inputs.baseurl }}
        run: |
          ARGS=(--ignore-urls "/^https?:/,/^#/" --ignore-empty-mailto)
          if [ -n "$BASEURL" ]; then
            ARGS+=(--swap-urls "${BASEURL}:")
          fi
          bundle exec htmlproofer ./_site "${ARGS[@]}"

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: ./_site
