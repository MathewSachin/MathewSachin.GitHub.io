name: Build Site

on:
  workflow_call:
    inputs:
      baseurl:
        description: 'Optional baseurl to inject into _config.yml'
        type: string
        default: ''
      preview:
        description: 'Whether this is a PR preview build (disables Google Analytics)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mathewsachin/mathewsachin-github-io-ci:latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: npm ci

      - name: Build Orama bundle and search index
        run: npm run build

      - name: Set baseurl
        if: inputs.baseurl != ''
        env:
          BASEURL: ${{ inputs.baseurl }}
        run: |
          echo "baseurl: $BASEURL" >> _config.yml

      - name: Disable Google Analytics for preview
        if: inputs.preview
        run: |
          echo "google-analytics: false" >> _config.yml

      - name: Diagnose libvips
        run: |
          echo "=== ldconfig libvips ==="
          ldconfig -p | grep -i vips || echo "NOT IN LDCONFIG"
          echo "=== libvips missing deps (ldd) ==="
          ldd /lib/x86_64-linux-gnu/libvips.so.42 2>&1 | grep "not found" || echo "NO MISSING DEPS"

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: ${{ runner.os }}-gems-

      - name: Install Ruby gems
        run: bundle config set path 'vendor/bundle' && bundle install

      - name: Diagnose ruby-vips
        run: |
          echo "=== ruby-vips require test ==="
          bundle exec ruby -e "require 'vips'; puts 'OK: ' + Vips::VERSION" 2>&1 || echo "FAILED"

      - name: Diagnose jekyll_picture_tag source
        run: |
          cat vendor/bundle/ruby/3.3.0/gems/jekyll_picture_tag-2.1.3/lib/jekyll_picture_tag/parsers/image_backend.rb
          echo "---vips_handler---"
          cat vendor/bundle/ruby/3.3.0/gems/jekyll_picture_tag-2.1.3/lib/jekyll_picture_tag/image_backends/vips_handler.rb | head -20

      - name: Build Jekyll site
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec ruby -e "require 'jekyll'; Bundler.require(:jekyll_plugins) rescue nil; puts 'Vips defined: '+(defined?(Vips)||'NO').inspect; puts 'has at_least_libvips?: '+Vips.respond_to?(:at_least_libvips?).inspect rescue nil; (puts 'at_least_libvips?(8,6): '+Vips.at_least_libvips?(8,6).inspect) rescue puts 'ERROR: '+\$!.class.to_s+': '+\$!.to_s" 2>&1
          bundle exec jekyll build --destination ./_site

      - name: Run html-proofer
        env:
          BASEURL: ${{ inputs.baseurl }}
        run: |
          ARGS=(--ignore-urls "/^https?:/,/^#/" --ignore-empty-mailto)
          if [ -n "$BASEURL" ]; then
            ARGS+=(--swap-urls "${BASEURL}:")
          fi
          bundle exec htmlproofer ./_site "${ARGS[@]}"

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: ./_site
