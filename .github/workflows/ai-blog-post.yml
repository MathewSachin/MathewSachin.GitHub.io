name: AI Blog Post Generator

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST (UTC+5:30)
    - cron: '30 14 * * *'  # 8:00 PM IST (UTC+5:30)
  workflow_dispatch:

jobs:
  trigger-copilot:
    runs-on: ubuntu-latest
    steps:
      - name: Create Copilot coding task
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          INSTRUCTIONS="Look around the internet and the latest news, pick the most interesting, engaging content you find and write a blog post about the same, maintaining the tone of the blog. Preferably keep it related to tech or finance. Link to and from other posts whenever appropriate. At the very end of the post, after a horizontal rule (---), add a footnote: <small>⚠️ <em>This post was generated by AI and may contain errors or inaccuracies. Always verify technical details from primary sources.</em></small>"

          printf '%s' "${INSTRUCTIONS}" > /tmp/issue-body.txt

          ISSUE_URL=$(gh issue create \
            --repo "${{ github.repository }}" \
            --title "AI Blog Post - ${DATE}" \
            --body-file /tmp/issue-body.txt \
            --assignee copilot)

          echo "Created Copilot task: ${ISSUE_URL}"
