name: AI Blog Post Generator

on:
  workflow_dispatch:

jobs:
  trigger-copilot:
    runs-on: ubuntu-latest
    steps:
      - name: Create Copilot coding task
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          INSTRUCTIONS="Look around the internet and the latest news, pick the most interesting, engaging content you find and write a blog post about the same, maintaining the tone of the blog. Preferably keep it related to tech or finance. In addition to covering the news itself, look for user reactions to the story — search for top comments, reactions, and opinions from places like Reddit, Hacker News, Twitter/X, or other forums and communities. Highlight and discuss the most interesting, insightful, or representative viewpoints people have shared, including any notable debates or differing perspectives. Link to and from other posts whenever appropriate. At the very end of the post, after a horizontal rule (---), add a footnote: <small>⚠️ <em>This post was generated by AI and may contain errors or inaccuracies. Always verify technical details from primary sources.</em></small>"

          printf '%s' "${INSTRUCTIONS}" > /tmp/issue-body.txt

          ISSUE_URL=$(gh issue create \
            --repo "${{ github.repository }}" \
            --title "AI Blog Post - ${DATE}" \
            --body-file /tmp/issue-body.txt \
            --assignee "@copilot")

          echo "Created Copilot task: ${ISSUE_URL}"
