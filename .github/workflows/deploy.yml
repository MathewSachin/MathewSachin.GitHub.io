name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build-site.yml
    permissions:
      contents: read

  build-for-testing:
    uses: ./.github/workflows/build-site.yml
    permissions:
      contents: read
    with:
      testing: true
      artifact_name: site-testing

  frontend-tests:
    needs: build-for-testing
    uses: ./.github/workflows/frontend-tests.yml
    permissions:
      contents: read
    with:
      artifact_name: site-testing

  deploy:
    needs: [build, frontend-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download site artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: site
          path: ./_site

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./_site
          branch: gh-pages
          clean-exclude: pr-preview
