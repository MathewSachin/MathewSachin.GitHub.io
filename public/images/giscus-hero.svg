<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <!-- Background -->
  <rect width="600" height="280" fill="#f6f8fa"/>

  <!-- Left half: Before Disqus -->
  <rect x="0" y="0" width="298" height="280" fill="#fff5f5"/>
  <!-- Right half: After giscus -->
  <rect x="302" y="0" width="298" height="280" fill="#f0fff4"/>

  <!-- Divider -->
  <line x1="300" y1="0" x2="300" y2="280" stroke="#d0d7de" stroke-width="2"/>

  <!-- === LEFT SIDE: Before Disqus === -->
  <!-- Header label -->
  <rect x="0" y="0" width="298" height="32" fill="#cb2431"/>
  <text x="149" y="21" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">Before: Disqus</text>

  <!-- Red X badge -->
  <circle cx="270" cy="16" r="12" fill="#ffffff"/>
  <line x1="264" y1="10" x2="276" y2="22" stroke="#cb2431" stroke-width="3" stroke-linecap="round"/>
  <line x1="276" y1="10" x2="264" y2="22" stroke="#cb2431" stroke-width="3" stroke-linecap="round"/>

  <!-- Ad banner 1 -->
  <rect x="16" y="44" width="266" height="34" rx="3" fill="#ffe8e8" stroke="#f5a0a0" stroke-width="1"/>
  <text x="30" y="58" font-family="Arial, sans-serif" font-size="9" fill="#888">AD</text>
  <rect x="46" y="50" width="100" height="6" rx="2" fill="#ffbbbb"/>
  <rect x="46" y="62" width="80" height="4" rx="2" fill="#ffbbbb"/>
  <text x="248" y="66" font-family="Arial, sans-serif" font-size="8" fill="#cb2431">✕</text>

  <!-- Slow loading spinner -->
  <rect x="16" y="86" width="266" height="28" rx="3" fill="#fff0f0" stroke="#f5a0a0" stroke-width="1"/>
  <circle cx="32" cy="100" r="8" fill="none" stroke="#cb2431" stroke-width="2" stroke-dasharray="14,10"/>
  <text x="48" y="104" font-family="Arial, sans-serif" font-size="10" fill="#888">Loading comments...</text>

  <!-- Comment box (cluttered) -->
  <rect x="16" y="122" width="266" height="50" rx="3" fill="#ffffff" stroke="#f5a0a0" stroke-width="1"/>
  <!-- Avatar -->
  <circle cx="32" cy="143" r="10" fill="#ddd"/>
  <!-- Comment lines -->
  <rect x="48" y="130" width="120" height="7" rx="2" fill="#eee"/>
  <rect x="48" y="143" width="180" height="5" rx="2" fill="#ddd"/>
  <rect x="48" y="155" width="140" height="5" rx="2" fill="#ddd"/>
  <!-- Disqus branding -->
  <text x="250" y="167" font-family="Arial, sans-serif" font-size="7" fill="#cb2431">Disqus</text>

  <!-- Ad banner 2 -->
  <rect x="16" y="180" width="266" height="34" rx="3" fill="#ffe8e8" stroke="#f5a0a0" stroke-width="1"/>
  <text x="30" y="194" font-family="Arial, sans-serif" font-size="9" fill="#888">SPONSORED</text>
  <rect x="100" y="188" width="120" height="6" rx="2" fill="#ffcccc"/>
  <rect x="100" y="200" width="90" height="4" rx="2" fill="#ffcccc"/>
  <text x="248" y="208" font-family="Arial, sans-serif" font-size="8" fill="#cb2431">✕</text>

  <!-- Tracking icons row -->
  <text x="20" y="238" font-family="Arial, sans-serif" font-size="9" fill="#888">Tracking:</text>
  <!-- Cookie icon -->
  <circle cx="88" cy="232" r="9" fill="#ffddcc" stroke="#cc9977" stroke-width="1"/>
  <circle cx="85" cy="230" r="1.5" fill="#995522"/>
  <circle cx="90" cy="234" r="1.5" fill="#995522"/>
  <circle cx="87" cy="237" r="1.5" fill="#995522"/>
  <!-- Fingerprint icon -->
  <circle cx="110" cy="232" r="9" fill="#ffe0e0" stroke="#cc7777" stroke-width="1"/>
  <path d="M106 232 Q110 226 114 232 Q110 238 106 232" fill="none" stroke="#cc4444" stroke-width="1"/>
  <!-- Pixel tracker icon -->
  <rect x="122" y="223" width="18" height="18" rx="2" fill="#fde" stroke="#cc77bb" stroke-width="1"/>
  <rect x="126" y="227" width="10" height="10" rx="1" fill="#ee88dd"/>
  <!-- Weight icon (JS payload) -->
  <circle cx="158" cy="232" r="9" fill="#ffe8cc" stroke="#ccaa66" stroke-width="1"/>
  <text x="158" y="236" font-family="monospace" font-size="9" text-anchor="middle" fill="#997722">1MB</text>

  <!-- Bottom summary -->
  <text x="149" y="265" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#cb2431">Ads · Trackers · Slow · Heavy · Privacy risk</text>

  <!-- === RIGHT SIDE: After giscus === -->
  <!-- Header label -->
  <rect x="302" y="0" width="298" height="32" fill="#2da44e"/>
  <text x="451" y="21" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#ffffff">After: giscus</text>

  <!-- Green checkmark badge -->
  <circle cx="330" cy="16" r="12" fill="#ffffff"/>
  <polyline points="324,16 329,22 338,10" fill="none" stroke="#2da44e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- GitHub-style discussion card 1 -->
  <rect x="318" y="48" width="264" height="72" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <!-- GitHub avatar placeholder -->
  <circle cx="340" cy="76" r="14" fill="#eef0f3"/>
  <!-- Octocat-style face -->
  <circle cx="336" cy="73" r="3" fill="#555"/>
  <circle cx="344" cy="73" r="3" fill="#555"/>
  <path d="M335 80 Q340 84 345 80" fill="none" stroke="#555" stroke-width="1.5"/>
  <!-- Comment header line -->
  <rect x="362" y="56" width="80" height="7" rx="2" fill="#24292f"/>
  <rect x="448" y="56" width="50" height="7" rx="2" fill="#8c959f"/>
  <!-- Comment body lines -->
  <rect x="362" y="70" width="200" height="6" rx="2" fill="#57606a"/>
  <rect x="362" y="82" width="170" height="6" rx="2" fill="#57606a"/>
  <rect x="362" y="94" width="130" height="6" rx="2" fill="#57606a"/>
  <!-- Reaction bar -->
  <rect x="362" y="106" width="30" height="16" rx="8" fill="#f3f4f6" stroke="#d0d7de" stroke-width="1"/>
  <text x="377" y="118" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#57606a">👍 2</text>

  <!-- GitHub-style discussion card 2 -->
  <rect x="318" y="130" width="264" height="60" rx="6" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>
  <circle cx="340" cy="157" r="14" fill="#ddf4ff"/>
  <circle cx="336" cy="154" r="3" fill="#0969da"/>
  <circle cx="344" cy="154" r="3" fill="#0969da"/>
  <path d="M335 161 Q340 165 345 161" fill="none" stroke="#0969da" stroke-width="1.5"/>
  <rect x="362" y="138" width="70" height="7" rx="2" fill="#24292f"/>
  <rect x="438" y="138" width="40" height="7" rx="2" fill="#8c959f"/>
  <rect x="362" y="152" width="200" height="6" rx="2" fill="#57606a"/>
  <rect x="362" y="164" width="150" height="6" rx="2" fill="#57606a"/>
  <rect x="362" y="176" width="30" height="14" rx="7" fill="#f3f4f6" stroke="#d0d7de" stroke-width="1"/>
  <text x="377" y="187" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#57606a">❤️ 1</text>

  <!-- "Reply via GitHub" label -->
  <rect x="318" y="200" width="264" height="36" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="221" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#57606a">Sign in with GitHub to comment...</text>

  <!-- Benefits badges -->
  <rect x="318" y="244" width="72" height="20" rx="10" fill="#dafbe1" stroke="#2da44e" stroke-width="1"/>
  <text x="354" y="258" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#116329">No ads</text>

  <rect x="398" y="244" width="78" height="20" rx="10" fill="#dafbe1" stroke="#2da44e" stroke-width="1"/>
  <text x="437" y="258" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#116329">No trackers</text>

  <rect x="484" y="244" width="84" height="20" rx="10" fill="#dafbe1" stroke="#2da44e" stroke-width="1"/>
  <text x="526" y="258" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#116329">Open source</text>

  <!-- Bottom summary -->
  <text x="451" y="275" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#116329">Powered by GitHub Discussions · Free · Fast · Private</text>
</svg>
